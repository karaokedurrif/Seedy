services:
  # ── Ollama (GPU, modelos locales) ──────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - /home/davidia/models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai_default

  # ── Open WebUI (interfaz ganadero) ─────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - ai_default

  # ── Qdrant (vector store para RAG backend) ─────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai_default

  # ── Seedy Backend (FastAPI) ────────────────────────
  seedy-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seedy-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - /home/davidia/Documentos/Seedy/conocimientos:/app/knowledge:ro
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - ai_default

  # ── InfluxDB (series temporales IoT) ───────────────
  influxdb:
    image: influxdb:2
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=neofarm
      - DOCKER_INFLUXDB_INIT_PASSWORD=neofarm2026
      - DOCKER_INFLUXDB_INIT_ORG=neofarm
      - DOCKER_INFLUXDB_INIT_BUCKET=porcidata
    networks:
      - ai_default

  # ── Mosquitto (MQTT broker IoT) ────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - ai_default

  # ── Node-RED (flujos IoT) ──────────────────────────
  nodered:
    image: nodered/node-red:latest
    container_name: nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - nodered_data:/data
    depends_on:
      - mosquitto
      - influxdb
    networks:
      - ai_default

  # ── Grafana (dashboards) ───────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=neofarm2026
    depends_on:
      - influxdb
    networks:
      - ai_default

volumes:
  ollama_data:
  open_webui_data:
  qdrant_data:
  influxdb_data:
  mosquitto_data:
  mosquitto_log:
  nodered_data:
  grafana_data:

networks:
  ai_default:
    name: ai_default
    driver: bridge
