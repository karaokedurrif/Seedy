[uwsgi]
# SearXNG uWSGI configuration — optimized for local use
# Workers - ajustado para uso interno (no masivo)
workers = 2
threads = 4

# Memory management
reload-on-rss = 512
worker-reload-mercy = 30

# Timeouts
http-timeout = 30
socket-timeout = 30

# Disable logging of normal requests to reduce noise
disable-logging = true
log-5xx = true
