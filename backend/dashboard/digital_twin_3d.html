<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seedy — Digital Twin 3D Gallineros Durrif</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d1117; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; }
  canvas { display:block; }
  #hud { position:fixed; top:10px; left:10px; color:#7fdbca; font-size:0.85em; background:#0d1117cc; padding:10px 14px; border-radius:8px; border:1px solid #333; z-index:10; }
  #hud h2 { font-size:1.1em; margin-bottom:6px; }
  #hud .stat { color:#94a3b8; font-size:0.8em; margin:2px 0; }
  #controls { position:fixed; bottom:10px; left:50%; transform:translateX(-50%); color:#94a3b8; font-size:0.75em; background:#0d1117cc; padding:6px 14px; border-radius:6px; border:1px solid #333; }
  #info { position:fixed; top:10px; right:10px; color:#e2e8f0; font-size:0.8em; background:#1e293bdd; padding:10px; border-radius:8px; border:1px solid #475569; display:none; max-width:220px; z-index:10; }
</style>
</head>
<body>
<div id="hud">
  <h2>&#127793; Digital Twin 3D</h2>
  <div class="stat">Los Capones de Palacio</div>
  <div class="stat">G1: 13 aves | G2: 12 aves</div>
  <div class="stat" id="fps"></div>
</div>
<div id="controls">&#x1F5B1; Rotar: click+arrastrar | &#x1F50D; Zoom: scroll | &#x21C6; Mover: click derecho</div>
<div id="info"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Scene setup ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);
scene.fog = new THREE.Fog(0x0d1117, 60, 100);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(15, 18, 28);
camera.lookAt(15, 0, 7);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(15, 0, 7);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2.1;

// ── Lights ──
const amb = new THREE.AmbientLight(0x404060, 0.6);
scene.add(amb);

const sun = new THREE.DirectionalLight(0xfff5e0, 1.2);
sun.position.set(20, 25, 15);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -35; sun.shadow.camera.right = 35;
sun.shadow.camera.top = 20; sun.shadow.camera.bottom = -5;
scene.add(sun);

const hemi = new THREE.HemisphereLight(0x87ceeb, 0x3d2817, 0.4);
scene.add(hemi);

// ── Helpers ──
function box(x, z, w, d, h, color, opacity=1, y=0) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshLambertMaterial({ color, transparent: opacity<1, opacity });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x + w/2, y + h/2, z + d/2);
  m.castShadow = true;
  m.receiveShadow = true;
  scene.add(m);
  return m;
}

function wireBox(x, z, w, d, h, color, y=0) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const edges = new THREE.EdgesGeometry(geo);
  const mat = new THREE.LineBasicMaterial({ color });
  const m = new THREE.LineSegments(edges, mat);
  m.position.set(x + w/2, y + h/2, z + d/2);
  scene.add(m);
  return m;
}

function fenceLine(points, height, color=0xaaaaaa) {
  // Vertical posts + horizontal wire
  for (let i = 0; i < points.length; i++) {
    const [x, z] = points[i];
    const [nx, nz] = points[(i+1) % points.length];
    // Post
    const post = box(x-0.03, z-0.03, 0.06, 0.06, height, 0x888888);
    // Wire between posts
    const geo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(x, height, z),
      new THREE.Vector3(nx, height, nz)
    ]);
    const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color, transparent:true, opacity:0.5 }));
    scene.add(line);
    // Lower wire
    const geo2 = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(x, height*0.5, z),
      new THREE.Vector3(nx, height*0.5, nz)
    ]);
    scene.add(new THREE.Line(geo2, new THREE.LineBasicMaterial({ color, transparent:true, opacity:0.3 })));
  }
}

// ── Ground ──
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(50, 30),
  new THREE.MeshLambertMaterial({ color: 0x3d2817 })
);
ground.rotation.x = -Math.PI/2;
ground.position.set(15, -0.01, 7);
ground.receiveShadow = true;
scene.add(ground);

// G1 area - lighter dirt
const g1Ground = new THREE.Mesh(
  new THREE.PlaneGeometry(25, 14),
  new THREE.MeshLambertMaterial({ color: 0x5c4033, transparent:true, opacity:0.6 })
);
g1Ground.rotation.x = -Math.PI/2;
g1Ground.position.set(12.5, 0.01, 7);
g1Ground.receiveShadow = true;
scene.add(g1Ground);

// G2 area
const g2Ground = new THREE.Mesh(
  new THREE.PlaneGeometry(5, 8),
  new THREE.MeshLambertMaterial({ color: 0x4a3728, transparent:true, opacity:0.6 })
);
g2Ground.rotation.x = -Math.PI/2;
g2Ground.position.set(27.5, 0.01, 10);
g2Ground.receiveShadow = true;
scene.add(g2Ground);

// ── SAUNA (wooden building) ──
const sauna = box(0, 8, 3.5, 6, 2.8, 0xb8860b);
sauna.userData = { name: 'Sauna', info: 'Edificio de madera 3.5×6m\nCámara G1 en fachada este' };
// Roof
const roofGeo = new THREE.BoxGeometry(4, 0.15, 6.5);
const roofMat = new THREE.MeshLambertMaterial({ color: 0x2d5016 });
const saunaRoof = new THREE.Mesh(roofGeo, roofMat);
saunaRoof.position.set(1.75, 3.0, 11);
saunaRoof.castShadow = true;
scene.add(saunaRoof);

// ── Caseta esquina sauna (G1 - 1×1m) ──
const casetaSauna = box(3.5, 13, 1, 1, 0.8, 0xdaa520, 0.9);
casetaSauna.userData = { name: 'Caseta Sauna', info: 'Nido G1 — 1×1m\nPegada a esquina NE sauna' };

// ── Caseta junto G2 (G1 - 1.5×0.7m) ──
const casetaCentral = box(23.5, 7.5, 1.5, 0.7, 0.8, 0xdaa520, 0.9);
casetaCentral.userData = { name: 'Caseta central', info: 'Nido G1 — 1.5×0.7m\nJunto al parque de G2' };

// ── Gallinero II — Caseta elevada 1.5×2m ──
// Patas
[[25.6, 12.1],[26.8,12.1],[25.6,13.8],[26.8,13.8]].forEach(([x,z]) => {
  box(x, z, 0.08, 0.08, 0.5, 0x666666);
});
// Caseta body (elevated)
const casetaG2 = box(25.5, 12, 1.5, 2, 1.0, 0xc8a050, 0.95, 0.5);
casetaG2.userData = { name: 'Caseta G2', info: 'Gallinero II — 1.5×2m\nElevada sobre patas\nNidos arriba, descanso debajo' };
// Small roof
const g2Roof = box(25.3, 11.8, 1.9, 2.4, 0.1, 0x5c3a1a, 1, 1.55);

// ── Tejado grande G2 (4×3m) ──
const tejadoGeo = new THREE.BoxGeometry(4, 0.08, 3);
const tejadoMat = new THREE.MeshLambertMaterial({ color: 0x4a4a4a, transparent:true, opacity:0.7 });
const tejadoG2 = new THREE.Mesh(tejadoGeo, tejadoMat);
tejadoG2.position.set(27, 2.5, 12.5);
tejadoG2.castShadow = true;
scene.add(tejadoG2);
// Tejado posts
[[25.1,11.1],[28.9,11.1],[25.1,13.9],[28.9,13.9]].forEach(([x,z]) => {
  box(x, z, 0.08, 0.08, 2.5, 0x666666);
});

// ── Composteros ──
const comp = box(12, 10, 4, 2, 0.6, 0x5c4033, 0.7);
comp.userData = { name: 'Composteros', info: 'Zona de compostaje\n4×2m' };
wireBox(12, 10, 4, 2, 0.6, 0x78716c);

// ── Comederos / Bebederos ──
function addFeeder(x, z, color, name) {
  const geo = new THREE.CylinderGeometry(0.2, 0.3, 0.5, 8);
  const mat = new THREE.MeshLambertMaterial({ color });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, 0.25, z);
  m.castShadow = true;
  m.userData = { name, info: name };
  scene.add(m);
  return m;
}
addFeeder(10.5, 3.5, 0x909090, 'Comedero G1');
addFeeder(13.25, 2.25, 0x2080c0, 'Bebedero G1');
addFeeder(26.25, 7.25, 0x909090, 'Comedero G2');
addFeeder(28.25, 7.75, 0x2080c0, 'Bebedero G2');

// ── Trees ──
function addTree(x, z, radius, height) {
  // Trunk
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.15, 0.2, height*0.6, 6),
    new THREE.MeshLambertMaterial({ color: 0x5c3a1a })
  );
  trunk.position.set(x, height*0.3, z);
  trunk.castShadow = true;
  scene.add(trunk);
  // Canopy
  const canopy = new THREE.Mesh(
    new THREE.SphereGeometry(radius, 8, 6),
    new THREE.MeshLambertMaterial({ color: 0x228b22, transparent:true, opacity:0.7 })
  );
  canopy.position.set(x, height*0.7, z);
  canopy.castShadow = true;
  scene.add(canopy);
}
addTree(5, 12, 1.5, 4);
addTree(10, 11, 2.0, 5);

// ── Fence (perimeter) ──
const perimPoints = [[0,0],[0,14],[3.5,14],[3.5,8.5],[8.5,8.5],[8.5,14],[25,14],[25,8],[30,8],[30,0],[25,0],[25,6],[15,0]];
fenceLine(perimPoints, 1.8, 0x3b82f6);

// ── Shared fence G1/G2 ──
fenceLine([[25,6],[25,14]], 1.8, 0xfbbf24);

// ── CAMERAS ──
function addCamera(x, y, z, aimX, aimY, aimZ, fovH, label, color=0xff0000) {
  // Camera body
  const camGeo = new THREE.BoxGeometry(0.3, 0.2, 0.15);
  const camMat = new THREE.MeshLambertMaterial({ color: 0xeeeeee });
  const cam = new THREE.Mesh(camGeo, camMat);
  cam.position.set(x, y, z);
  cam.lookAt(aimX, aimY, aimZ);
  cam.castShadow = true;
  cam.userData = { name: label, info: `${label}\nVIGI C340 4K\n3840×2160 | FOV ${fovH}°` };
  scene.add(cam);

  // Lens
  const lensGeo = new THREE.CylinderGeometry(0.06, 0.08, 0.1, 8);
  const lensMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
  const lens = new THREE.Mesh(lensGeo, lensMat);
  lens.position.set(x, y, z);
  lens.lookAt(aimX, aimY, aimZ);
  scene.add(lens);

  // Red indicator light
  const led = new THREE.Mesh(
    new THREE.SphereGeometry(0.05, 6, 6),
    new THREE.MeshBasicMaterial({ color })
  );
  led.position.set(x, y+0.15, z);
  scene.add(led);

  // FOV cone
  const dist = 6;
  const halfRad = (fovH / 2) * Math.PI / 180;
  const dx = aimX - x, dz = aimZ - z;
  const angle = Math.atan2(dz, dx);
  const coneGeo = new THREE.BufferGeometry();
  const v = [
    x, y, z,
    x + dist * Math.cos(angle - halfRad), 0.1, z + dist * Math.sin(angle - halfRad),
    x + dist * Math.cos(angle + halfRad), 0.1, z + dist * Math.sin(angle + halfRad),
  ];
  coneGeo.setAttribute('position', new THREE.Float32BufferAttribute(v, 3));
  coneGeo.setIndex([0,1,2]);
  coneGeo.computeVertexNormals();
  const coneMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.08, side: THREE.DoubleSide });
  scene.add(new THREE.Mesh(coneGeo, coneMat));

  // FOV edge lines
  const lineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(x, y, z),
    new THREE.Vector3(x + dist*Math.cos(angle-halfRad), 0.1, z + dist*Math.sin(angle-halfRad)),
  ]);
  scene.add(new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color, transparent:true, opacity:0.3 })));
  const lineGeo2 = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(x, y, z),
    new THREE.Vector3(x + dist*Math.cos(angle+halfRad), 0.1, z + dist*Math.sin(angle+halfRad)),
  ]);
  scene.add(new THREE.Line(lineGeo2, new THREE.LineBasicMaterial({ color, transparent:true, opacity:0.3 })));

  // Label
  return cam;
}

// CAM G1 — on SAUNA east wall, pointing toward G1 center
addCamera(3.5, 2.5, 11, 15, 0.5, 5, 100, 'CAM G1 (10.10.10.11)', 0xff3333);

// CAM G2 — north side of G2, pointing south over park
addCamera(27.5, 2.5, 13.5, 27.5, 0.5, 8, 100, 'CAM G2 (10.10.10.10)', 0xff3333);

// ── Floating labels ──
function addLabel(text, x, y, z, color='#22c55e') {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = color;
  ctx.font = 'bold 24px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(text, 128, 40);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.position.set(x, y, z);
  sprite.scale.set(4, 1, 1);
  scene.add(sprite);
}
addLabel('GALLINERO I (13 aves)', 12, 3.5, 5, '#22c55e');
addLabel('GALLINERO II (12 aves)', 27.5, 3.5, 10, '#3b82f6');
addLabel('SAUNA', 1.75, 4, 11, '#a78bfa');

// ── Animated chickens ──
const chickens = [];
function addChicken(x, z, color=0xffffff) {
  const body = new THREE.Mesh(
    new THREE.SphereGeometry(0.18, 6, 5),
    new THREE.MeshLambertMaterial({ color })
  );
  body.position.set(x, 0.2, z);
  body.castShadow = true;
  scene.add(body);

  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.1, 5, 4),
    new THREE.MeshLambertMaterial({ color })
  );
  head.position.set(x+0.15, 0.35, z);
  scene.add(head);

  // Comb
  const comb = new THREE.Mesh(
    new THREE.SphereGeometry(0.04, 4, 4),
    new THREE.MeshLambertMaterial({ color: 0xff0000 })
  );
  comb.position.set(x+0.15, 0.42, z);
  scene.add(comb);

  const chicken = { body, head, comb, baseX: x, baseZ: z, phase: Math.random()*Math.PI*2, speed: 0.3+Math.random()*0.4, range: 0.5+Math.random()*1.5 };
  chickens.push(chicken);
  return chicken;
}

// G1 chickens (scattered across large area)
const g1Colors = [0xffffff, 0x333333, 0xdaa520, 0xb8860b, 0xffffff, 0x666666, 0xffd700, 0x8b4513, 0xffffff, 0xc0c0c0, 0xff8c00, 0x444444, 0xeedd82];
g1Colors.forEach((c, i) => {
  addChicken(3 + Math.random()*20, 1 + Math.random()*12, c);
});

// G2 chickens
const g2Colors = [0xdaa520, 0xdaa520, 0xdaa520, 0xc0c0c0, 0x5c3a1a, 0x8b4513, 0x333333, 0xffffff, 0xcccccc, 0xffffff, 0x4a6fa5, 0xaa8855];
g2Colors.forEach((c, i) => {
  addChicken(25.5 + Math.random()*4, 7 + Math.random()*5, c);
});

// ── Raycaster for clicks ──
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const infoDiv = document.getElementById('info');

renderer.domElement.addEventListener('click', (e) => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(scene.children);
  for (const hit of hits) {
    if (hit.object.userData?.name) {
      infoDiv.innerHTML = `<b>${hit.object.userData.name}</b><br>${(hit.object.userData.info||'').replace(/\n/g,'<br>')}`;
      infoDiv.style.display = 'block';
      setTimeout(() => infoDiv.style.display = 'none', 4000);
      break;
    }
  }
});

// ── Animation loop ──
let lastTime = 0, frames = 0, fpsSec = 0;
function animate(time) {
  requestAnimationFrame(animate);

  // FPS counter
  frames++;
  if (time - fpsSec > 1000) {
    document.getElementById('fps').textContent = `${frames} FPS`;
    frames = 0; fpsSec = time;
  }

  // Animate chickens
  const t = time * 0.001;
  chickens.forEach(c => {
    const dx = Math.sin(t * c.speed + c.phase) * c.range;
    const dz = Math.cos(t * c.speed * 0.7 + c.phase) * c.range * 0.6;
    c.body.position.x = c.baseX + dx;
    c.body.position.z = c.baseZ + dz;
    c.body.position.y = 0.2 + Math.abs(Math.sin(t * 3 + c.phase)) * 0.03;
    c.head.position.x = c.body.position.x + 0.15;
    c.head.position.z = c.body.position.z;
    c.head.position.y = c.body.position.y + 0.15;
    c.comb.position.copy(c.head.position);
    c.comb.position.y += 0.07;
  });

  // Pulse camera LEDs
  scene.children.forEach(obj => {
    if (obj.material?.color && obj.geometry?.parameters?.radius === 0.05) {
      const pulse = 0.5 + 0.5 * Math.sin(t * 3);
      obj.material.opacity = pulse;
      obj.material.transparent = true;
    }
  });

  controls.update();
  renderer.render(scene, camera);
}
animate(0);

// ── Resize ──
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
