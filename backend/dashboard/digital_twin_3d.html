<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Twin 3D — Los Capones de Palacio</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e17;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh}
  #c{width:100vw;height:100vh;display:block}
  #hud{position:fixed;top:0;left:0;right:0;z-index:100;background:linear-gradient(180deg,rgba(10,14,23,.95),rgba(10,14,23,.7));padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(34,197,94,.3);backdrop-filter:blur(10px)}
  #hud h1{font-size:16px;font-weight:700;background:linear-gradient(135deg,#22c55e,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  #hud .sub{font-size:10px;color:#6b7280}
  .btn-bar{display:flex;gap:5px;flex-wrap:wrap}
  .btn-bar button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#e0e0e0;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:10px;font-weight:500;transition:.2s}
  .btn-bar button:hover{background:rgba(34,197,94,.2);border-color:#22c55e}
  .btn-bar button.on{background:rgba(34,197,94,.25);border-color:#22c55e;color:#22c55e}
  #layers{position:fixed;top:55px;right:14px;z-index:100;background:rgba(10,14,23,.9);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;backdrop-filter:blur(10px);font-size:11px}
  #layers h3{font-size:11px;color:#22c55e;margin-bottom:5px}
  #layers label{display:flex;align-items:center;gap:6px;margin:3px 0;cursor:pointer}
  #layers input{accent-color:#22c55e}
  #info{position:fixed;bottom:14px;right:14px;z-index:100;background:rgba(10,14,23,.9);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 16px;min-width:220px;backdrop-filter:blur(10px);font-size:11px;display:none}
  #info h3{font-size:13px;font-weight:600;margin-bottom:4px}
  #info .d{color:#9ca3af;margin:2px 0}
  #loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;color:#22c55e;font-size:16px;font-weight:600}
  #status{position:fixed;bottom:14px;left:14px;z-index:100;font-size:10px;color:#6b7280}
  #sim-bar{position:fixed;top:55px;left:14px;z-index:100;background:rgba(10,14,23,.9);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;backdrop-filter:blur(10px);font-size:11px;display:none;min-width:240px}
  #sim-bar h3{font-size:11px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  #sim-bar .sim-mode{display:flex;gap:0;border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.1);margin-bottom:8px}
  #sim-bar .sim-mode button{flex:1;padding:4px 6px;font-size:9px;font-weight:600;border:none;cursor:pointer;background:rgba(255,255,255,.04);color:#9ca3af;transition:.15s}
  #sim-bar .sim-mode button.active{background:rgba(245,158,11,.25);color:#f59e0b}
  #sim-bar .sim-ctrl{margin:6px 0}
  #sim-bar .sim-ctrl label{display:block;font-size:10px;color:#6b7280;margin-bottom:2px}
  #sim-bar .sim-ctrl input[type=range]{width:100%;accent-color:#f59e0b}
  #sim-bar .sim-ctrl .val{font-size:10px;color:#f59e0b;float:right}
  .sim-play{display:flex;gap:4px;margin-top:8px}
  .sim-play button{flex:1;padding:4px;border-radius:4px;border:none;cursor:pointer;font-size:10px;font-weight:600;transition:.15s}
  .sim-play .play{background:rgba(34,197,94,.2);color:#22c55e}
  .sim-play .pause{background:rgba(245,158,11,.2);color:#f59e0b}
  .sim-play .reset{background:rgba(239,68,68,.15);color:#ef4444}
  #sim-indicator{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:200;background:rgba(245,158,11,.9);color:#000;padding:4px 14px;border-radius:6px;font-size:11px;font-weight:700;display:none}
</style>
</head>
<body>
<div id="hud">
  <div>
    <h1>🐔 Los Capones de Palacio — Digital Twin 3D</h1>
    <div class="sub">Three.js · Geometría desde BIM JSON · 3 cámaras</div>
  </div>
  <div class="btn-bar">
    <button onclick="setCamMode('orbit')" id="b-orbit" class="on">🌐 Orbit</button>
    <button onclick="setCamMode('iso')" id="b-iso">📐 Isométrica</button>
    <button onclick="setCamMode('top')" id="b-top">⬇ Planta</button>
    <button onclick="setCamMode('fps')" id="b-fps">🚶 WASD</button>
    <button onclick="setCamMode('pov',0)" id="b-pov0">📹 Dahua</button>
    <button onclick="setCamMode('pov',1)" id="b-pov1">📹 Nueva</button>
    <button onclick="setCamMode('pov',2)" id="b-pov2">📹 Vigi II</button>
    <span style="width:1px;height:18px;background:rgba(255,255,255,.15);margin:0 4px"></span>
    <button onclick="toggleSimMode()" id="b-sim" style="color:#f59e0b;border-color:rgba(245,158,11,.3)">🧪 Simulación</button>
  </div>
</div>

<div id="sim-indicator">🧪 MODO SIMULACIÓN</div>

<div id="sim-bar">
  <h3 style="color:#f59e0b">🧪 Simulación</h3>
  <div class="sim-mode">
    <button class="active" onclick="setSimType('meteo')">🌧️ Meteo</button>
    <button onclick="setSimType('bio')">🦠 Bioseg.</button>
    <button onclick="setSimType('expand')">🏗️ Expan.</button>
    <button onclick="setSimType('finance')">💰 Finan.</button>
  </div>
  <div id="sim-meteo-panel">
    <div class="sim-ctrl"><label>Temperatura (°C) <span class="val" id="v-temp">8</span></label><input type="range" min="-10" max="40" value="8" oninput="simParams.temp=+this.value;document.getElementById('v-temp').textContent=this.value"></div>
    <div class="sim-ctrl"><label>Lluvia (mm/h) <span class="val" id="v-rain">0</span></label><input type="range" min="0" max="50" value="0" oninput="simParams.rain=+this.value;document.getElementById('v-rain').textContent=this.value"></div>
    <div class="sim-ctrl"><label>Viento (km/h) <span class="val" id="v-wind">5</span></label><input type="range" min="0" max="80" value="5" oninput="simParams.wind=+this.value;document.getElementById('v-wind').textContent=this.value"></div>
  </div>
  <div id="sim-bio-panel" style="display:none">
    <div class="sim-ctrl"><label>Tasa transmisión (R0) <span class="val" id="v-r0">2.5</span></label><input type="range" min="0" max="10" step="0.1" value="2.5" oninput="simParams.r0=+this.value;document.getElementById('v-r0').textContent=this.value"></div>
    <div class="sim-ctrl"><label>Periodo incubación (d) <span class="val" id="v-incub">3</span></label><input type="range" min="1" max="14" value="3" oninput="simParams.incubation=+this.value;document.getElementById('v-incub').textContent=this.value"></div>
    <div class="sim-ctrl"><label>Mortalidad (%) <span class="val" id="v-mort">5</span></label><input type="range" min="0" max="50" value="5" oninput="simParams.mortality=+this.value;document.getElementById('v-mort').textContent=this.value"></div>
  </div>
  <div id="sim-expand-panel" style="display:none">
    <div style="font-size:10px;color:#9ca3af;padding:4px 0">Click en el terreno para colocar un nuevo gallinero fantasma</div>
    <div class="sim-ctrl"><label>Ancho (m) <span class="val" id="v-ew">3</span></label><input type="range" min="1" max="10" step="0.5" value="3" oninput="simParams.expandW=+this.value;document.getElementById('v-ew').textContent=this.value"></div>
    <div class="sim-ctrl"><label>Largo (m) <span class="val" id="v-ed">3</span></label><input type="range" min="1" max="10" step="0.5" value="3" oninput="simParams.expandD=+this.value;document.getElementById('v-ed').textContent=this.value"></div>
  </div>
  <div id="sim-finance-panel" style="display:none">
    <div class="sim-ctrl"><label>Coste pienso (€/mes) <span class="val" id="v-feed">150</span></label><input type="range" min="50" max="500" value="150" oninput="simParams.feedCost=+this.value;document.getElementById('v-feed').textContent=this.value"></div>
    <div class="sim-ctrl"><label>Precio capón (€/ud) <span class="val" id="v-price">35</span></label><input type="range" min="10" max="80" value="35" oninput="simParams.caponPrice=+this.value;document.getElementById('v-price').textContent=this.value"></div>
    <div class="sim-ctrl"><label>Huevos/día <span class="val" id="v-eggs">8</span></label><input type="range" min="0" max="30" value="8" oninput="simParams.eggsDay=+this.value;document.getElementById('v-eggs').textContent=this.value"></div>
  </div>
  <div class="sim-play">
    <button class="play" onclick="simPlay()">▶ Play</button>
    <button class="pause" onclick="simPause()">⏸ Pausa</button>
    <button class="reset" onclick="simReset()">🔄 Reset</button>
  </div>
</div>

<div id="layers">
  <h3>Capas</h3>
  <label><input type="checkbox" checked onchange="tglLayer('terreno',this.checked)"> Terreno</label>
  <label><input type="checkbox" checked onchange="tglLayer('zonas',this.checked)"> Zonas</label>
  <label><input type="checkbox" checked onchange="tglLayer('edificios',this.checked)"> Edificios</label>
  <label><input type="checkbox" checked onchange="tglLayer('vallas',this.checked)"> Vallas</label>
  <label><input type="checkbox" checked onchange="tglLayer('equipamiento',this.checked)"> Equipamiento</label>
  <label><input type="checkbox" checked onchange="tglLayer('camaras',this.checked)"> Cámaras + FOV</label>
  <label><input type="checkbox" checked onchange="tglLayer('animales',this.checked)"> Animales</label>
  <label><input type="checkbox" onchange="tglLayer('sensores',this.checked)"> Sensores IoT</label>
  <label><input type="checkbox" onchange="tglLayer('alertas',this.checked)"> Alertas</label>
  <label><input type="checkbox" onchange="tglLayer('trayectorias',this.checked)"> Trayectorias</label>
</div>

<div id="fps-hint" style="position:fixed;bottom:50%;left:50%;transform:translateX(-50%);z-index:150;background:rgba(10,14,23,.9);border:1px solid #22c55e;border-radius:8px;padding:10px 18px;font-size:12px;color:#22c55e;display:none;pointer-events:none">Click para capturar ratón · WASD mover · Espacio subir · Shift bajar · ESC salir</div>

<div id="info">
  <button onclick="this.parentElement.style.display='none'" style="float:right;background:none;border:none;color:#6b7280;cursor:pointer;font-size:13px">✕</button>
  <h3 id="it"></h3><div id="ic"></div>
</div>

<div id="loading">⏳ Cargando BIM...</div>
<div id="status"></div>

<canvas id="c"></canvas>

<!-- Three.js from CDN (r147 = last version with classic script support) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>

<script>
/* ══════════════════════════════════════════════════════════════

   Geometría paramétrica desde BIM JSON + fallback inline

   gallinas como sprites por raza, iluminación cálida
   Three.js r147 (last version with classic script support)
   ══════════════════════════════════════════════════════════════ */

    {"id":"CAM-001","class":"IfcSensor","name":"Dahua WizSense 4K","geometry":{"type":"point","x":4.25,"y":8.8,"z":2.2},"properties":{"sensor_type":"video","model":"DH-IPC-HFW2841T-ZS","stream_name":"sauna_durrif_1","heading_deg":90,"fov_deg":75,"range_m":8}},

    {"id":"CAM-003","class":"IfcSensor","name":"Vigi GII TP-Link","geometry":{"type":"point","x":26.15,"y":7.65,"z":2},"properties":{"sensor_type":"video","model":"TP-Link VIGI C340","stream_name":"gallinero_durrif_2","heading_deg":180,"fov_deg":60,"range_m":6}},

    {"id":"EQ-002","class":"IfcFurniture","name":"Comedero GI","geometry":{"type":"point","x":13,"y":8,"z":0},"properties":{"tipo":"comedero","zona":"Parque GI"}},
    {"id":"EQ-003","class":"IfcFurniture","name":"Compostera","geometry":{"type":"point","x":11,"y":7.5,"z":0},"properties":{"tipo":"compostera","zona":"Parque GI"}},
    {"id":"EQ-004","class":"IfcFurniture","name":"Bebedero GII","geometry":{"type":"point","x":26.5,"y":4.5,"z":0},"properties":{"tipo":"bebedero","zona":"Parque GII"}},
    {"id":"EQ-005","class":"IfcFurniture","name":"Comedero GII","geometry":{"type":"point","x":26.5,"y":3,"z":0},"properties":{"tipo":"comedero","zona":"Parque GII"}},
    {"id":"VEG-001","class":"IfcGeographicElement","name":"Almendro grande central","geometry":{"type":"point","x":8,"y":9,"z":0},"properties":{"species":"almendro","canopy_radius_m":3.5}},
    {"id":"Z-HUERTO","class":"IfcSpace","name":"Huerto (fuera perímetro avícola)","geometry":{"type":"rect","x":4.5,"y":0.5,"w":19,"h":5.5},"properties":{"avicola":false,"uso":"cultivo rotación"}}

// ── Fallback bird positions (census-based) ──
const FALLBACK_BIRDS = [
  {id:"PAL-01",breed:"Bresse",sex:"F",x:8.0,y:9.5},
  {id:"PAL-02",breed:"Sussex",sex:"F",x:10.5,y:10.2},
  {id:"PAL-03",breed:"Vorwerk",sex:"M",x:7.2,y:8.8},

  {id:"PAL-27",breed:"Sulmtaler",sex:"F",x:27.2,y:8.0},
  {id:"PAL-28",breed:"Araucana",sex:"F",x:26.0,y:9.5},
  {id:"PAL-29",breed:"Pita Pinta",sex:"F",x:25.2,y:7.0},
  {id:"PAL-30",breed:"Sussex",sex:"F",x:27.5,y:10.5},
  {id:"PAL-31",breed:"Bresse",sex:"F",x:26.3,y:11.0},
  {id:"PAL-32",breed:"Marans",sex:"F",x:27.0,y:1.5},
];

// ── Breed color palette ──
const BREED_COLORS = {
  'Sussex':0xF5F5F0,'Bresse':0xFFFFF0,'Vorwerk':0xDAA520,
  'Marans':0x5C3317,'Sulmtaler':0xC19A6B,'Andaluza':0x6B8BA4,
  'Pita Pinta':0x2F1B14,'Araucana':0x708090
};

// ── Scene setup ──
const canvas = document.getElementById('c');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xC5D8E8); // cielo azul claro
scene.fog = new THREE.FogExp2(0xC5D8E8, 0.008);

const renderer = new THREE.WebGLRenderer({canvas, antialias: true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(15, 20, 25);
camera.lookAt(15, 0, 7.5);

// ── Sky gradient sphere ──
(function addSkyGradient() {
  const skyGeo = new THREE.SphereGeometry(90, 32, 16);
  const skyMat = new THREE.ShaderMaterial({
    uniforms: {
      topColor: { value: new THREE.Color(0x87CEEB) },
      bottomColor: { value: new THREE.Color(0xE8E0D8) },
    },
    vertexShader: 'varying vec3 vWP; void main(){ vWP=(modelMatrix*vec4(position,1.0)).xyz; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
    fragmentShader: 'uniform vec3 topColor; uniform vec3 bottomColor; varying vec3 vWP; void main(){ float h=normalize(vWP).y; gl_FragColor=vec4(mix(bottomColor,topColor,max(h,0.0)),1.0); }',
    side: THREE.BackSide,
    depthWrite: false,
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));
})();

const controls = new THREE.OrbitControls(camera, canvas);
controls.target.set(15, 0, 7.5);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI/2.1;
controls.update();

// ── Lighting (warm morning sunlight) ──
scene.add(new THREE.AmbientLight(0xFFF5E6, 0.6));
const sun = new THREE.DirectionalLight(0xFFF0D0, 0.9);
sun.position.set(15, 20, 10);
sun.castShadow = true;
sun.shadow.camera.left = -20; sun.shadow.camera.right = 35;
sun.shadow.camera.top = 20; sun.shadow.camera.bottom = -5;
sun.shadow.mapSize.set(2048, 2048);
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x87CEEB, 0x5C7A3D, 0.4));

// ── Layer groups ──
const layers = {};
['terreno','zonas','edificios','vallas','equipamiento','camaras','animales','sensores','alertas','trayectorias'].forEach(n => {
  layers[n] = new THREE.Group();
  layers[n].name = n;
  scene.add(layers[n]);
});

// ── Materials ──
const M = {
  ground:     new THREE.MeshStandardMaterial({color:0x4A7C3F, roughness:0.95}),
  groundDirt: new THREE.MeshStandardMaterial({color:0x8B7355, roughness:0.9}),
  muro:       new THREE.MeshStandardMaterial({color:0x8B8B6B, roughness:0.85}),
  muroVeg:    new THREE.MeshStandardMaterial({color:0x3D6B3D, roughness:0.8}),
  sauna:      new THREE.MeshStandardMaterial({color:0x8B7355, roughness:0.75}),
  saunaRoof:  new THREE.MeshStandardMaterial({color:0x5C4033, roughness:0.7}),
  coopWood:   new THREE.MeshStandardMaterial({color:0xD4A76A, roughness:0.6}),
  coopWhite:  new THREE.MeshStandardMaterial({color:0xE8E4DA, roughness:0.55}),

  glass:      new THREE.MeshStandardMaterial({color:0x87CEEB, transparent:true, opacity:0.5, roughness:0.2}),

  wire:       new THREE.LineBasicMaterial({color:0xA0522D, linewidth:2}),
  wireGreen:  new THREE.LineBasicMaterial({color:0x558855, linewidth:1}),
  zoneGI:     new THREE.MeshStandardMaterial({color:0x4CAF50, transparent:true, opacity:0.06, side:THREE.DoubleSide}),
  zoneGII:    new THREE.MeshStandardMaterial({color:0x2196F3, transparent:true, opacity:0.06, side:THREE.DoubleSide}),
  huerto:     new THREE.MeshStandardMaterial({color:0x8B5E3C, transparent:true, opacity:0.08, side:THREE.DoubleSide}),
  trunk:      new THREE.MeshStandardMaterial({color:0x5C3D2E, roughness:0.9}),
  canopyGreen:new THREE.MeshStandardMaterial({color:0x2D6B2D, roughness:0.8}),
  canopyPink: new THREE.MeshStandardMaterial({color:0xE8A0BF, transparent:true, opacity:0.85, roughness:0.7}),
  cam:        new THREE.MeshStandardMaterial({color:0x333333, roughness:0.3, metalness:0.6}),
  fovD:       new THREE.MeshBasicMaterial({color:0xf59e0b, transparent:true, opacity:0.06, side:THREE.DoubleSide}),

  bancalPlant:new THREE.MeshStandardMaterial({color:0x228B22, roughness:0.8}),

// ── BIM→3D coord conversion ──
function j2t(jx, jy, jz) {
  return new THREE.Vector3(jx, jz || 0, 15 - jy);
}

// ═══════════════════════════════════════════════════════
// PROFESSIONAL GEOMETRY BUILDERS
// ═══════════════════════════════════════════════════════

function createCoop(el, wallMat, roofMat) {
  const g = el.geometry;
  const w = g.w, d = g.h, h = g.height || 2;
  const group = new THREE.Group();
  const wallH = h * 0.7;

  // Walls
  const walls = new THREE.Mesh(new THREE.BoxGeometry(w, wallH, d), wallMat);
  const pos = j2t(g.x + w/2, g.y + d/2, wallH/2);
  walls.position.copy(pos);
  walls.castShadow = true;
  walls.receiveShadow = true;
  group.add(walls);

  // Gabled roof (two-slope)
  const roofH = h * 0.35;
  const overhang = 0.15;
  const roofShape = new THREE.Shape();
  roofShape.moveTo(-w/2 - overhang, 0);
  roofShape.lineTo(0, roofH);
  roofShape.lineTo(w/2 + overhang, 0);
  roofShape.closePath();
  const roofGeo = new THREE.ExtrudeGeometry(roofShape, {depth: d + overhang*2, bevelEnabled: false});
  const roof = new THREE.Mesh(roofGeo, roofMat);
  roof.position.set(pos.x, wallH, pos.z + d/2 + overhang);
  roof.rotation.x = 0;
  roof.castShadow = true;
  group.add(roof);

  // Door (on south-facing side = +z in Three.js)
  const doorW = Math.min(w * 0.3, 0.4);
  const doorH = Math.min(wallH * 0.6, 0.6);
  const doorGeo = new THREE.PlaneGeometry(doorW, doorH);
  const door = new THREE.Mesh(doorGeo, M.door);
  door.position.set(pos.x, doorH/2, pos.z + d/2 + 0.01);
  group.add(door);

  // Porthole window
  const circGeo = new THREE.CircleGeometry(0.12, 12);
  const porthole = new THREE.Mesh(circGeo, M.glass);
  porthole.position.set(pos.x - w/4, wallH * 0.7, pos.z + d/2 + 0.01);
  group.add(porthole);

  group.userData = {id: el.id, name: el.name, props: el.properties};
  return group;
}

function createSauna(el) {
  const g = el.geometry;
  const w = g.w, d = g.h, h = g.height || 4;
  const group = new THREE.Group();
  const wallH = h * 0.75;

  // Walls
  const walls = new THREE.Mesh(new THREE.BoxGeometry(w, wallH, d), M.sauna);
  const pos = j2t(g.x + w/2, g.y + d/2, wallH/2);
  walls.position.copy(pos);
  walls.castShadow = true;
  walls.receiveShadow = true;
  group.add(walls);

  // Gabled roof
  const roofH = h * 0.3;
  const roofShape = new THREE.Shape();
  roofShape.moveTo(-w/2 - 0.2, 0);
  roofShape.lineTo(0, roofH);
  roofShape.lineTo(w/2 + 0.2, 0);
  roofShape.closePath();
  const roofGeo = new THREE.ExtrudeGeometry(roofShape, {depth: d + 0.4, bevelEnabled: false});
  const roof = new THREE.Mesh(roofGeo, M.saunaRoof);
  roof.position.set(pos.x, wallH, pos.z + d/2 + 0.2);
  roof.castShadow = true;
  group.add(roof);

  // Door
  const door = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 1.5), M.door);
  door.position.set(pos.x, 0.75, pos.z + d/2 + 0.01);
  group.add(door);

  // Window (east-facing = -x direction)
  const window = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.6), M.glass);
  window.rotation.y = Math.PI/2;
  window.position.set(pos.x + w/2 + 0.01, wallH * 0.55, pos.z);
  group.add(window);

  group.userData = {id: el.id, name: el.name, props: el.properties};
  return group;
}

function createAlmendroTree(el) {
  const pos = j2t(el.geometry.x, el.geometry.y, 0);
  const r = el.properties?.canopy_radius_m || 3;
  const group = new THREE.Group();
  // Trunk
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.25, 3, 8), M.trunk);
  trunk.position.set(pos.x, 1.5, pos.z);
  trunk.castShadow = true;
  group.add(trunk);
  // Green canopy — irregular icosahedron with vertex noise
  const canopyGeo = new THREE.IcosahedronGeometry(r, 2);
  const posAttr = canopyGeo.attributes.position;
  for (let i = 0; i < posAttr.count; i++) {
    const nx = posAttr.getX(i), ny = posAttr.getY(i), nz = posAttr.getZ(i);
    const noise = 0.85 + Math.random() * 0.3;
    posAttr.setXYZ(i, nx * noise, ny * noise, nz * noise);
  }
  posAttr.needsUpdate = true;
  canopyGeo.computeVertexNormals();
  const canopy = new THREE.Mesh(canopyGeo, M.canopyGreen);
  canopy.position.set(pos.x, 3.5 + r*0.3, pos.z);
  canopy.castShadow = true;
  group.add(canopy);
  group.userData = {id: el.id, name: el.name};
  return group;
}

function createPrunusTree(x, y, trunkH, canopyR) {
  trunkH = trunkH || 2.5;
  canopyR = canopyR || 1.5;
  const pos = j2t(x, y, 0);
  const group = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.1, trunkH, 6), M.trunk);
  trunk.position.set(pos.x, trunkH/2, pos.z);
  trunk.castShadow = true;
  group.add(trunk);
  // Pink canopy — irregular icosahedron (flores de prunus, marzo)
  const canopyGeo = new THREE.IcosahedronGeometry(canopyR, 1);
  const posAttr = canopyGeo.attributes.position;
  for (let i = 0; i < posAttr.count; i++) {
    const nx = posAttr.getX(i), ny = posAttr.getY(i), nz = posAttr.getZ(i);
    const noise = 0.8 + Math.random() * 0.4;
    posAttr.setXYZ(i, nx * noise, ny * noise * 0.7, nz * noise);
  }
  posAttr.needsUpdate = true;
  canopyGeo.computeVertexNormals();
  const canopy = new THREE.Mesh(canopyGeo, M.canopyPink);
  canopy.position.set(pos.x, trunkH + canopyR*0.6, pos.z);
  canopy.castShadow = true;
  group.add(canopy);
  return group;
}

function createMuro(el) {
  const g = el.geometry;
  const w = g.w, d = g.h, h = g.height || 2.5;
  const pos = j2t(g.x + w/2, g.y + d/2, h/2);
  const group = new THREE.Group();

  // Stone wall base
  const base = new THREE.Mesh(new THREE.BoxGeometry(w, h * 0.7, d), M.muro);
  base.position.set(pos.x, h * 0.35, pos.z);
  base.receiveShadow = true;
  group.add(base);

  // Vegetation on top
  const veg = new THREE.Mesh(new THREE.BoxGeometry(w, h * 0.35, d * 1.5), M.muroVeg);
  veg.position.set(pos.x, h * 0.82, pos.z);
  veg.castShadow = true;
  group.add(veg);

  // Prunus trees scattered along the muro
  const prunusPositions = [2, 5, 9, 13, 17, 21, 25, 28];
  prunusPositions.forEach(px => {
    const tree = createPrunusTree(px, 13.8, 2 + Math.random()*1.5, 1 + Math.random()*0.8);
    group.add(tree);
  });

  group.userData = {id: el.id, name: el.name, props: el.properties};
  return group;
}

function createZonePlane(el, mat) {
  const g = el.geometry;
  if (g.type === 'rect') {
    const geo = new THREE.PlaneGeometry(g.w, g.h);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = -Math.PI/2;
    const pos = j2t(g.x + g.w/2, g.y + g.h/2, 0.02);
    mesh.position.copy(pos);
    mesh.userData = {id: el.id, name: el.name};
    return mesh;
  }
  if (g.type === 'polygon') {
    const shape = new THREE.Shape();
    g.points.forEach((p, i) => {
      const v = j2t(p[0], p[1], 0);
      if (i === 0) shape.moveTo(v.x, -v.z); else shape.lineTo(v.x, -v.z);
    });
    shape.closePath();
    const geo = new THREE.ShapeGeometry(shape);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = -Math.PI/2;
    mesh.position.y = 0.02;
    mesh.userData = {id: el.id, name: el.name};
    return mesh;
  }
}

function createFenceLine(el, mat) {
  const pts = el.geometry.points.map(p => j2t(p[0], p[1], 0.6));
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const line = new THREE.Line(geo, mat);
  const group = new THREE.Group();
  group.add(line);
  // Wire mesh effect: add second line at different height
  const pts2 = el.geometry.points.map(p => j2t(p[0], p[1], 0.3));
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts2), mat));
  const pts3 = el.geometry.points.map(p => j2t(p[0], p[1], 0.9));
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts3), mat));
  // Posts
  const postGeo = new THREE.CylinderGeometry(0.04, 0.06, 1.2, 6);
  pts.forEach(p => {
    const post = new THREE.Mesh(postGeo, M.fence);
    post.position.set(p.x, 0.6, p.z);
    post.castShadow = true;
    group.add(post);
  });
  group.userData = {id: el.id, name: el.name};
  return group;
}

function createCamera3D(el, fovMat) {
  const g = el.geometry;
  const pos = j2t(g.x, g.y, g.z || 2);
  const group = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.15, 0.3), M.cam);
  body.position.copy(pos);
  body.castShadow = true;
  group.add(body);
  const heading = (el.properties?.heading_deg || 0) * Math.PI / 180;
  const lens = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.06, 0.1, 8), M.cam);
  lens.rotation.z = Math.PI/2;
  lens.position.set(pos.x + Math.cos(heading)*0.2, pos.y, pos.z - Math.sin(heading)*0.2);
  group.add(lens);
  const fov = (el.properties?.fov_deg || 60) * Math.PI / 180;
  const range = el.properties?.range_m || 6;
  const coneGeo = new THREE.ConeGeometry(Math.tan(fov/2)*range, range, 16, 1, true);
  const cone = new THREE.Mesh(coneGeo, fovMat);
  cone.rotation.x = -Math.PI/2;
  cone.rotation.z = -heading + Math.PI/2;
  cone.position.set(pos.x + Math.cos(heading)*range/2, pos.y - 0.5, pos.z - Math.sin(heading)*range/2);
  group.add(cone);
  group.userData = {id: el.id, name: el.name, props: el.properties};
  return group;
}

function createEquipment(el, mat) {
  const pos = j2t(el.geometry.x, el.geometry.y, 0);
  const tipo = el.properties?.tipo || '';
  const group = new THREE.Group();
  if (tipo === 'bebedero') {
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.3, 0.05, 16), mat);
    base.position.set(pos.x, 0.025, pos.z);
    group.add(base);
    const bowl = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.05, 8, 16), mat);
    bowl.rotation.x = Math.PI/2;
    bowl.position.set(pos.x, 0.1, pos.z);
    group.add(bowl);
  } else if (tipo === 'comedero') {
    const trough = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.15, 0.25), mat);
    trough.position.set(pos.x, 0.075, pos.z);
    trough.castShadow = true;
    group.add(trough);
  } else {
    const box = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.3, 0.4), mat);
    box.position.set(pos.x, 0.15, pos.z);
    box.castShadow = true;
    group.add(box);
  }
  group.userData = {id: el.id, name: el.name};
  return group;
}

function createHuertoBancales(el) {
  const g = el.geometry;
  const group = new THREE.Group();
  // Overall zone plane
  const zone = createZonePlane(el, M.huerto);
  if (zone) group.add(zone);
  // Raised beds (bancales)
  const startX = g.x + 1, startY = g.y + 1;
  for (let row = 0; row < 2; row++) {
    for (let col = 0; col < 4; col++) {
      const bx = startX + col * 4.5;
      const by = startY + row * 2.5;
      const bpos = j2t(bx + 1.5, by + 0.5, 0.15);
      // Wooden frame
      const frame = new THREE.Mesh(new THREE.BoxGeometry(3, 0.3, 1), M.bancal);
      frame.position.copy(bpos);
      group.add(frame);
      // Soil inside
      const soil = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.2, 0.8), M.bancalSoil);
      soil.position.set(bpos.x, 0.25, bpos.z);
      group.add(soil);
      // Plants (small green bumps)
      for (let p = 0; p < 5; p++) {
        const plant = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6, 4), M.bancalPlant);
        plant.position.set(bpos.x - 1.2 + p * 0.6, 0.4, bpos.z + (Math.random()-0.5)*0.3);
        group.add(plant);
      }
    }
  }
  group.userData = {id: el.id, name: el.name};
  return group;
}

// ── Chicken sprite creator ──
function createChickenSprite(breed, pos3d, birdData) {
  const color = BREED_COLORS[breed] || 0xAAAAAA;
  const canvas2d = document.createElement('canvas');
  canvas2d.width = 64; canvas2d.height = 64;
  const ctx = canvas2d.getContext('2d');
  const hexStr = '#' + color.toString(16).padStart(6,'0');
  // Body oval
  ctx.fillStyle = hexStr;
  ctx.beginPath();
  ctx.ellipse(32, 38, 18, 14, 0, 0, Math.PI*2);
  ctx.fill();
  // Head
  ctx.beginPath();
  ctx.arc(44, 24, 8, 0, Math.PI*2);
  ctx.fill();
  // Crest
  ctx.fillStyle = '#CC3333';
  ctx.beginPath();
  ctx.arc(46, 17, 4, 0, Math.PI*2);
  ctx.fill();
  // Beak
  ctx.fillStyle = '#E8B030';
  ctx.beginPath();
  ctx.moveTo(52, 24);
  ctx.lineTo(58, 26);
  ctx.lineTo(52, 28);
  ctx.fill();
  // Eye
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(46, 22, 1.5, 0, Math.PI*2);
  ctx.fill();
  // Legs
  ctx.strokeStyle = '#D4A017';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(28, 50); ctx.lineTo(24, 60);
  ctx.moveTo(36, 50); ctx.lineTo(40, 60);
  ctx.stroke();

  const texture = new THREE.CanvasTexture(canvas2d);
  const spriteMat = new THREE.SpriteMaterial({map: texture, transparent: true});
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(0.7, 0.7, 1);
  sprite.position.copy(pos3d);
  sprite.position.y = 0.35;
  sprite.userData = {
    id: birdData.id,
    name: `${birdData.id} · ${breed} ${birdData.sex === 'M' ? '♂' : '♀'}`,
    props: {raza: breed, sexo: birdData.sex, gallinero: birdData.x > 24 ? 'GII' : 'GI'}
  };
  return sprite;
}

// ── Camera POV positions ──
let camPOVs = [];

// ── Load BIM and build scene ──
async function loadBIM() {
  let bim;
  try {
    const resp = await fetch(BIM_URL);
    if (!resp.ok) throw new Error(`${resp.status}`);
    bim = await resp.json();
  } catch(e) {
    console.warn('BIM API failed, using inline fallback:', e);
    bim = BIM_FALLBACK;
  }
  buildScene(bim);
  loadBirds();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('status').textContent =
    `✅ ${bim.elements.length} elementos BIM · ${FALLBACK_BIRDS.length} aves · Three.js r${THREE.REVISION}`;
}

function buildScene(bim) {
  const els = bim.elements || [];

  // Ground plane (grass green)
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(36, 22), M.ground);
  ground.rotation.x = -Math.PI/2;
  ground.position.set(15, -0.01, 7.5);
  ground.receiveShadow = true;
  layers.terreno.add(ground);

  // Dirt patches in parque areas
  const dirtGI = new THREE.Mesh(new THREE.PlaneGeometry(18, 6), M.groundDirt);
  dirtGI.rotation.x = -Math.PI/2;
  dirtGI.position.set(14, 0.005, 15 - 10);
  dirtGI.receiveShadow = true;
  layers.terreno.add(dirtGI);

  els.forEach(el => {
    const id = el.id;
    if (id === 'MT-001') {
      layers.terreno.add(createMuro(el));
    } else if (id === 'RF-001') {
      layers.edificios.add(createSauna(el));
    } else if (id === 'COOP-001') {
      layers.edificios.add(createCoop(el, M.coopWhite, M.roof));
    } else if (id === 'COOP-002') {
      layers.edificios.add(createCoop(el, M.coopWood, M.roof));
    } else if (id === 'Z-GI') {
      const mesh = createZonePlane(el, M.zoneGI);
      if (mesh) layers.zonas.add(mesh);
    } else if (id === 'Z-GII') {
      const mesh = createZonePlane(el, M.zoneGII);
      if (mesh) layers.zonas.add(mesh);
    } else if (id === 'Z-HUERTO') {
      layers.zonas.add(createHuertoBancales(el));
    } else if (id === 'FEN-001') {
      layers.vallas.add(createFenceLine(el, M.wire));
    } else if (id === 'FEN-002') {
      layers.vallas.add(createFenceLine(el, M.wireGreen));
    } else if (id === 'CAM-001') {
      layers.camaras.add(createCamera3D(el, M.fovD));
      camPOVs.push(el);
    } else if (id === 'CAM-002') {
      layers.camaras.add(createCamera3D(el, M.fovN));
      camPOVs.push(el);
    } else if (id === 'CAM-003') {
      layers.camaras.add(createCamera3D(el, M.fovV));
      camPOVs.push(el);
    } else if (id.startsWith('EQ-')) {
      const tipo = el.properties?.tipo || '';
      const mat = tipo === 'bebedero' ? M.eq : M.eqY;
      layers.equipamiento.add(createEquipment(el, mat));
    } else if (id === 'VEG-001') {
      layers.terreno.add(createAlmendroTree(el));
    }
  });
}

// ── Load birds (fallback or API) ──
const animalSprites = new Map();

function loadBirds() {
  // Try API first, fall back to hardcoded census positions
  fetch('/api/tracking/palacio/latest')
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => {
      if (Array.isArray(data) && data.length > 0) {
        updateAnimalPositions(data);
      } else {
        loadFallbackBirds();
      }
    })
    .catch(() => loadFallbackBirds());
}

function loadFallbackBirds() {
  FALLBACK_BIRDS.forEach(b => {
    const pos = j2t(b.x, b.y, 0);
    const sprite = createChickenSprite(b.breed, pos, b);
    layers.animales.add(sprite);
    animalSprites.set(b.id, sprite);
  });
}

function updateAnimalPositions(animals) {
  animals.forEach(a => {
    let sprite = animalSprites.get(a.id);
    if (!sprite) {
      const pos = j2t(a.x, a.y, 0);
      sprite = createChickenSprite(a.breed || 'Sussex', pos, a);
      layers.animales.add(sprite);
      animalSprites.set(a.id, sprite);
    }
    const pos = j2t(a.x, a.y, 0);
    pos.y = 0.35;
    sprite.position.lerp(pos, 0.3);
  });
}

// ── WebSocket for animal tracking ──
function connectTracking() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/ws/tracking`);
  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (Array.isArray(data)) updateAnimalPositions(data);
    } catch(err) {}
  };
  ws.onerror = () => setTimeout(connectTracking, 10000);
  ws.onclose = () => setTimeout(connectTracking, 10000);
}

// ── Polling fallback for bird positions (every 4s, same as YOLO) ──
let _trackingAvailable = true;
let _trackingRetries = 0;
setInterval(() => {
  if (!_trackingAvailable) return; // stop polling after repeated 404s
  fetch('/api/tracking/palacio')
    .then(r => {
      if (!r.ok) { _trackingRetries++; if (_trackingRetries > 3) _trackingAvailable = false; return null; }
      _trackingRetries = 0;
      return r.json();
    })
    .then(data => {
      // endpoint returns {gallinero, summary, active_tracks} — extract array
      const animals = data && Array.isArray(data.active_tracks) ? data.active_tracks : (Array.isArray(data) ? data : null);
      if (animals && animals.length > 0) updateAnimalPositions(animals);
    })
    .catch(() => { _trackingRetries++; if (_trackingRetries > 3) _trackingAvailable = false; });
}, 4000);

// ── First Person (WASD) controls ──
let fpsMode = false;
const fpsKeys = {};
let yaw = 0, pitch = 0;

document.addEventListener('keydown', e => { if (fpsMode) fpsKeys[e.code] = true; });
document.addEventListener('keyup', e => { fpsKeys[e.code] = false; });

function enterFPS() {
  fpsMode = true;
  controls.enabled = false;
  camera.position.set(15, 1.7, 7.5);
  yaw = 0; pitch = 0;
  document.getElementById('fps-hint').style.display = 'block';
  canvas.requestPointerLock();
}

function exitFPS() {
  fpsMode = false;
  controls.enabled = true;
  document.getElementById('fps-hint').style.display = 'none';
  if (document.pointerLockElement) document.exitPointerLock();
}

canvas.addEventListener('click', () => {
  if (fpsMode && !document.pointerLockElement) canvas.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  if (!document.pointerLockElement && fpsMode) {
    document.getElementById('fps-hint').style.display = 'block';
  } else if (document.pointerLockElement) {
    document.getElementById('fps-hint').style.display = 'none';
  }
});

document.addEventListener('mousemove', e => {
  if (!fpsMode || !document.pointerLockElement) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
});

function updateFPS() {
  if (!fpsMode) return;
  const speed = 0.12;
  const dir = new THREE.Vector3();
  if (fpsKeys['KeyW']) dir.z -= 1;
  if (fpsKeys['KeyS']) dir.z += 1;
  if (fpsKeys['KeyA']) dir.x -= 1;
  if (fpsKeys['KeyD']) dir.x += 1;
  dir.normalize().multiplyScalar(speed);
  const cos = Math.cos(yaw), sin = Math.sin(yaw);
  const dx = dir.x * cos - dir.z * sin;
  const dz = dir.x * sin + dir.z * cos;
  camera.position.x += dx;
  camera.position.z += dz;
  if (fpsKeys['Space']) camera.position.y += speed;
  if (fpsKeys['ShiftLeft'] || fpsKeys['ShiftRight']) camera.position.y -= speed;
  camera.position.x = Math.max(-2, Math.min(32, camera.position.x));
  camera.position.z = Math.max(-2, Math.min(18, camera.position.z));
  camera.position.y = Math.max(0.5, Math.min(20, camera.position.y));
  const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
  camera.quaternion.setFromEuler(euler);
}

document.addEventListener('keydown', e => {
  if (e.code === 'Escape' && fpsMode) exitFPS();
});

// ── Camera modes ──
function setCamMode(mode, idx) {
  if (fpsMode) exitFPS();
  document.querySelectorAll('.btn-bar button').forEach(b => b.classList.remove('on'));

  if (mode === 'orbit') {
    camera.position.set(15, 20, 25);
    controls.target.set(15, 0, 7.5);
    controls.enabled = true;
    document.getElementById('b-orbit').classList.add('on');
  }
  else if (mode === 'iso') {
    camera.position.set(40, 25, 30);
    controls.target.set(15, 0, 7.5);
    camera.zoom = 1;
    camera.updateProjectionMatrix();
    controls.enabled = true;
    document.getElementById('b-iso').classList.add('on');
  }
  else if (mode === 'top') {
    camera.position.set(15, 35, 7.5);
    controls.target.set(15, 0, 7.5);
    controls.enabled = true;
    document.getElementById('b-top').classList.add('on');
  }
  else if (mode === 'fps') {
    enterFPS();
    document.getElementById('b-fps').classList.add('on');
    return;
  }
  else if (mode === 'pov' && camPOVs[idx]) {
    const el = camPOVs[idx];
    const g = el.geometry;
    const pos = j2t(g.x, g.y, g.z || 2);
    camera.position.copy(pos);
    const heading = (el.properties?.heading_deg || 0) * Math.PI / 180;
    const range = el.properties?.range_m || 6;
    controls.target.set(
      pos.x + Math.cos(heading) * range * 0.5,
      pos.y - 1,
      pos.z - Math.sin(heading) * range * 0.5
    );
    controls.enabled = true;
    document.getElementById('b-pov' + idx)?.classList.add('on');
  }
  controls.update();
}

function tglLayer(name, visible) {
  if (layers[name]) layers[name].visible = visible;
}

// ── Raycaster for click info ──
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
canvas.addEventListener('click', (e) => {
  if (simActive && simType === 'expand') return; // handled by sim
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(scene.children, true);
  for (const hit of hits) {
    let obj = hit.object;
    while (obj && !obj.userData?.name) obj = obj.parent;
    if (obj?.userData?.name) {
      showInfo(obj.userData);
      break;
    }
  }
});

function showInfo(data) {
  document.getElementById('it').textContent = data.name || data.id;
  let html = `<div class="d">ID: ${data.id}</div>`;
  if (data.props) {
    Object.entries(data.props).forEach(([k,v]) => {
      if (v !== null && v !== undefined) html += `<div class="d">${k}: ${v}</div>`;
    });
  }
  document.getElementById('ic').innerHTML = html;
  document.getElementById('info').style.display = 'block';
}

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Animate ──
let _animClock = 0;
function animate() {
  requestAnimationFrame(animate);
  _animClock += 0.016; // ~60fps assumed
  updateFPS();
  if (!fpsMode) controls.update();
  if (simActive && simRunning) {
    if (simType === 'meteo') updateSimMeteo();
    else if (simType === 'bio') updateSimBio();
  }
  // Chicken idle bobbing
  animalSprites.forEach((sprite, id) => {
    const hash = id.charCodeAt(id.length - 1) || 0;
    sprite.position.y = 0.35 + Math.sin(_animClock * 2.5 + hash) * 0.03;
  });
  renderer.render(scene, camera);
}

// ══════════════════════════════════════════════════════════════
// SIMULATION LAYER (variables declared before animate() to avoid TDZ)
// ══════════════════════════════════════════════════════════════

let simActive = false;
let simType = 'meteo';
let simRunning = false;
let simTime = 0;

// ── Init ──
loadBIM();
animate();
setTimeout(connectTracking, 3000);
const simParams = {
  temp: 8, rain: 0, wind: 5,
  r0: 2.5, incubation: 3, mortality: 5,
  expandW: 3, expandD: 3,
  feedCost: 150, caponPrice: 35, eggsDay: 8,
};

const simObjects = { particles: [], ghostBuilding: null, heatmapPlane: null };

function toggleSimMode() {
  simActive = !simActive;
  document.getElementById('sim-bar').style.display = simActive ? 'block' : 'none';
  document.getElementById('sim-indicator').style.display = simActive ? 'block' : 'none';
  document.getElementById('b-sim').classList.toggle('on', simActive);
  if (!simActive) simReset();
}

function setSimType(type) {
  simType = type;
  ['meteo','bio','expand','finance'].forEach(t => {
    const panel = document.getElementById('sim-' + t + '-panel');
    if (panel) panel.style.display = t === type ? 'block' : 'none';
  });
  document.querySelectorAll('#sim-bar .sim-mode button').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase().includes(
      type === 'meteo' ? 'meteo' : type === 'bio' ? 'bioseg' : type === 'expand' ? 'expan' : 'finan'
    ));
  });
  simReset();
}

function simPlay() { simRunning = true; }
function simPause() { simRunning = false; }

function simReset() {
  simRunning = false;
  simTime = 0;
  simObjects.particles.forEach(p => scene.remove(p));
  simObjects.particles = [];
  if (simObjects.ghostBuilding) {
    scene.remove(simObjects.ghostBuilding);
    simObjects.ghostBuilding = null;
  }
  if (simObjects.heatmapPlane) {
    scene.remove(simObjects.heatmapPlane);
    simObjects.heatmapPlane = null;
  }
  animalSprites.forEach(sprite => {
    if (sprite.material.color) sprite.material.color.setHex(0xffffff);
  });
  // Restore default lighting
  sun.intensity = 0.9;
  scene.fog.color.setHex(0xC5D8E8);
}

function updateSimMeteo() {
  if (simParams.rain > 0 && simObjects.particles.length < 200) {
    const geo = new THREE.SphereGeometry(0.03, 4, 4);
    const mat = new THREE.MeshBasicMaterial({color: 0x6b9ad0, transparent: true, opacity: 0.5});
    for (let i = 0; i < Math.min(simParams.rain, 10); i++) {
      const drop = new THREE.Mesh(geo, mat);
      drop.position.set(Math.random()*30, 10 + Math.random()*5, Math.random()*15);
      drop.userData.vy = -0.1 - Math.random()*0.1;
      simObjects.particles.push(drop);
      scene.add(drop);
    }
  }
  simObjects.particles.forEach(p => {
    p.position.y += p.userData.vy;
    if (p.position.y < 0) {
      p.position.y = 10 + Math.random()*5;
      p.position.x = Math.random()*30;
      p.position.z = Math.random()*15;
    }
  });
  const tempFactor = (simParams.temp + 10) / 50;
  sun.intensity = 0.4 + tempFactor * 1.0;
  if (simParams.temp < 0) {
    scene.fog.color.setHex(0x8899AA);
  } else {
    scene.fog.color.setHex(0xC5D8E8);
  }
}

function updateSimBio() {
  simTime += 0.016;
  const daysSim = simTime * 10;
  const S0 = 26;
  const beta = simParams.r0 / simParams.incubation;
  const gamma = 1 / simParams.incubation;
  const I = S0 * Math.exp((beta - gamma) * Math.min(daysSim, 30)) / (S0 + Math.exp((beta - gamma) * Math.min(daysSim, 30)));
  const infectedRatio = Math.min(I / S0, 1);

  let idx = 0;
  animalSprites.forEach(sprite => {
    const isInfected = (idx / animalSprites.size) < infectedRatio;
    // For sprites we can't change color directly - but we can tint
    if (sprite.material.color) {
      sprite.material.color.setHex(isInfected ? 0xff4444 : 0x44ff44);
    }
    idx++;
  });
}

canvas.addEventListener('click', function(e) {
  if (!simActive || simType !== 'expand') return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects([...layers.terreno.children], false);
  if (hits.length > 0) {
    const pt = hits[0].point;
    if (simObjects.ghostBuilding) scene.remove(simObjects.ghostBuilding);
    const geo = new THREE.BoxGeometry(simParams.expandW, 2.5, simParams.expandD);
    const mat = new THREE.MeshStandardMaterial({color: 0x22c55e, transparent: true, opacity: 0.3});
    const ghost = new THREE.Mesh(geo, mat);
    ghost.position.set(pt.x, 1.25, pt.z);
    const wire = new THREE.LineSegments(
      new THREE.EdgesGeometry(geo),
      new THREE.LineBasicMaterial({color: 0x22c55e, linewidth: 2})
    );
    ghost.add(wire);
    simObjects.ghostBuilding = ghost;
    scene.add(ghost);
  }
});
</script>
