<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seedy — Plano 2D Gallineros Durrif</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1a2e; color:#eee; font-family:'Segoe UI',system-ui,sans-serif; }
  h1 { text-align:center; padding:12px; font-size:1.3em; color:#7fdbca; }
  .subtitle { text-align:center; color:#888; font-size:0.85em; margin-bottom:10px; }
  #container { display:flex; justify-content:center; padding:0 20px 20px; }
  svg { background:#0d1117; border-radius:12px; border:1px solid #333; max-width:100%; height:auto; }
  .legend { position:fixed; bottom:10px; right:10px; background:#0d1117dd; border:1px solid #444; border-radius:8px; padding:10px; font-size:0.75em; }
  .legend div { display:flex; align-items:center; gap:6px; margin:3px 0; }
  .legend .swatch { width:14px; height:14px; border-radius:3px; border:1px solid #555; }
  .tooltip { position:fixed; background:#1e293b; color:#e2e8f0; padding:8px 12px; border-radius:6px; font-size:0.8em; pointer-events:none; display:none; border:1px solid #475569; z-index:100; max-width:250px; }
</style>
</head>
<body>
<h1>&#127793; Plano 2D — Gallineros Los Capones de Palacio</h1>
<p class="subtitle">Medidas reales — 20 mar 2026 | Escala: 1m = 25px</p>
<div id="container"></div>
<div class="legend">
  <div><span class="swatch" style="background:#ef4444"></span> Camaras VIGI</div>
  <div><span class="swatch" style="background:#22c55e44;border-color:#22c55e"></span> G1 — Zona muro</div>
  <div><span class="swatch" style="background:#3b82f644;border-color:#3b82f6"></span> G2 — Esquina gallinero</div>
  <div><span class="swatch" style="background:#a78bfa44;border-color:#a78bfa"></span> Sauna</div>
  <div><span class="swatch" style="background:#f59e0b44;border-color:#f59e0b"></span> Casetas/nidos</div>
  <div><span class="swatch" style="background:#06b6d444;border-color:#06b6d4"></span> Comederos/bebederos</div>
  <div><span class="swatch" style="background:#4ade80"></span> Arboles</div>
  <div><span class="swatch" style="background:#fbbf24"></span> &#128020; Gallinas (sinteticas)</div>
</div>
<div class="tooltip" id="tip"></div>

<script>
const S = 25;
const PAD = 40;
const W = 32, H = 18;
const svgW = W*S + PAD*2, svgH = H*S + PAD*2;

const tx = (x) => PAD + x * S;
const ty = (y) => PAD + (H - y) * S;
function pts(arr) { return arr.map(([x,y]) => tx(x)+','+ty(y)).join(' '); }
function rect(x, y, w, h) { return 'x="'+tx(x)+'" y="'+ty(y+h)+'" width="'+w*S+'" height="'+h*S+'"'; }

const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
svg.setAttribute('viewBox', '0 0 '+svgW+' '+svgH);
svg.setAttribute('width', svgW);
svg.setAttribute('height', svgH);

let html = '';

// Grid
for (let i = 0; i <= W; i++) {
  html += '<line x1="'+tx(i)+'" y1="'+ty(0)+'" x2="'+tx(i)+'" y2="'+ty(H)+'" stroke="#222" stroke-width="0.5"/>';
  if (i % 5 === 0) html += '<text x="'+tx(i)+'" y="'+ty(-0.3)+'" fill="#555" font-size="9" text-anchor="middle">'+i+'m</text>';
}
for (let j = 0; j <= H; j++) {
  html += '<line x1="'+tx(0)+'" y1="'+ty(j)+'" x2="'+tx(W)+'" y2="'+ty(j)+'" stroke="#222" stroke-width="0.5"/>';
  if (j % 5 === 0) html += '<text x="'+tx(-0.5)+'" y="'+ty(j)+'" fill="#555" font-size="9" text-anchor="end">'+j+'m</text>';
}

// ── Muro norte (30m, y=14..15) ──
html += '<rect '+rect(0,14,30,1.5)+' fill="#78716c" fill-opacity="0.3" stroke="#78716c" stroke-width="1.5" data-tip="Muro con talud y arboles&#10;30m de largo"/>';
html += '<text x="'+tx(15)+'" y="'+ty(14.7)+'" fill="#78716c" font-size="10" text-anchor="middle">MURO CON TALUD Y ARBOLES — 30m</text>';
// Trees on wall
for (let i = 0; i < 15; i++) {
  const cx = 1 + i*2;
  html += '<circle cx="'+tx(cx)+'" cy="'+ty(15.2)+'" r="'+S*0.7+'" fill="#4ade80" fill-opacity="0.2" stroke="#4ade80" stroke-width="0.5"/>';
  html += '<text x="'+tx(cx)+'" y="'+ty(15)+'" fill="#4ade80" font-size="8" text-anchor="middle">&#127794;</text>';
}

// Arrow marker
html += '<defs><marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,1 L6,3 L0,5" fill="#666"/></marker></defs>';

// ── Perimetro (valla) ──
var perim = [[0,0],[0,14],[3.5,14],[3.5,8.5],[8.5,8.5],[8.5,14],[25,14],[25,8],[30,8],[30,0],[25,0],[25,6],[15,0]];
html += '<polygon points="'+pts(perim)+'" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round" opacity="0.7"/>';

// ── GALLINERO I — zona pegada al muro (norte) ──
// G1 es la franja larga pegada al muro: desde la sauna hacia el este,
// incluye el pasillo y toda la zona superior pegada al muro
var g1Zone = [[0,8],[0,14],[3.5,14],[3.5,8.5],[8.5,8.5],[8.5,14],[25,14],[25,8]];
html += '<polygon points="'+pts(g1Zone)+'" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-width="1" stroke-dasharray="4 2" data-tip="Gallinero I — Zona muro&#10;Franja larga pegada al muro norte&#10;Incluye pasillo + patio superior&#10;13 aves"/>';

// ── GALLINERO II — esquina NE ──
var g2Zone = [[25,8],[25,14],[30,14],[30,8]];
html += '<polygon points="'+pts(g2Zone)+'" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 2" data-tip="Gallinero II — Esquina&#10;Coop + parque vallado&#10;12 aves"/>';

// ── Zona inferior (huerto / exterior) ──
var huerto = [[0,0],[0,8],[3.5,8],[3.5,8.5],[8.5,8.5],[8.5,8],[25,8],[25,0],[15,0]];
html += '<polygon points="'+pts(huerto)+'" fill="#f59e0b" fill-opacity="0.04" stroke="#f59e0b" stroke-width="0.5" stroke-dasharray="2 4" data-tip="Zona huerto / exterior&#10;Bancales + invernadero"/>';

// ── Sauna ──
html += '<rect '+rect(0,8,3.5,6)+' fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-width="1.5" rx="3" data-tip="Sauna&#10;3.5m x 6m | Edificio madera&#10;Camara G1 en fachada este"/>';
html += '<text x="'+tx(1.75)+'" y="'+ty(11)+'" fill="#a78bfa" font-size="11" text-anchor="middle" font-weight="bold">SAUNA</text>';
html += '<text x="'+tx(1.75)+'" y="'+ty(10.3)+'" fill="#a78bfa88" font-size="8" text-anchor="middle">3.5x6m</text>';

// ── Caseta G2 (elevada) — en la esquina ──
html += '<rect '+rect(25.5,12,1.5,2)+' fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="1.5" rx="2" data-tip="Caseta G2 (elevada)&#10;1.5m x 2m | Nidos arriba&#10;Descanso debajo"/>';
html += '<text x="'+tx(26.25)+'" y="'+ty(12.8)+'" fill="#f59e0b" font-size="8" text-anchor="middle">Caseta G2</text>';

// ── Gallinero II coop structure ──
html += '<rect '+rect(24,11.5,6,2.5)+' fill="#3b82f6" fill-opacity="0.06" stroke="#3b82f6" stroke-width="1" rx="2" data-tip="Coop Gallinero II&#10;Estructura con tejado&#10;6x2.5m"/>';
html += '<text x="'+tx(27)+'" y="'+ty(13.5)+'" fill="#3b82f655" font-size="7" text-anchor="middle">Coop + tejado</text>';

// ── Caseta esquina sauna (G1) ──
html += '<rect '+rect(3.5,13,1,1)+' fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="1.5" rx="2" data-tip="Caseta esquina sauna&#10;1m x 1m | Nido G1"/>';
html += '<text x="'+tx(4)+'" y="'+ty(13.3)+'" fill="#f59e0b" font-size="7" text-anchor="middle">1x1</text>';

// ── Caseta junto a G2 (G1) ──
html += '<rect '+rect(23.5,7.5,1.5,0.7)+' fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="1.5" rx="2" data-tip="Caseta junto a G2&#10;1.5m x 0.7m | Nido G1"/>';

// ── Huerto: bancales ──
for (var i = 0; i < 5; i++) {
  html += '<rect '+rect(6+i*2.5, 4, 2.0, 3.5)+' fill="#5a8a2a" fill-opacity="0.15" stroke="#5a8a2a" stroke-width="1" rx="2" data-tip="Bancal huerto&#10;2.0 x 3.5m"/>';
}
html += '<text x="'+tx(12)+'" y="'+ty(6)+'" fill="#5a8a2a" font-size="9" text-anchor="middle">HUERTO</text>';

// ── Invernadero / tunel bajo ──
html += '<rect '+rect(7,1,6,1.5)+' fill="#dddddd" fill-opacity="0.08" stroke="#dddddd" stroke-width="0.8" rx="4" stroke-dasharray="3 2" data-tip="Tunel bajo / Invernadero"/>';
html += '<text x="'+tx(10)+'" y="'+ty(1.6)+'" fill="#aaa" font-size="7" text-anchor="middle">tunel</text>';

// ── Comederos / Bebederos (en zona G1, pegados al muro) ──
html += '<rect '+rect(10,10,1,1)+' fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="1" rx="2" data-tip="Comedero G1"/>';
html += '<text x="'+tx(10.5)+'" y="'+ty(10.3)+'" fill="#06b6d4" font-size="7" text-anchor="middle">&#127847;</text>';
html += '<rect '+rect(13,10,0.5,0.5)+' fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="1" rx="2" data-tip="Bebedero G1"/>';
html += '<text x="'+tx(13.25)+'" y="'+ty(10.1)+'" fill="#06b6d4" font-size="7" text-anchor="middle">&#128167;</text>';
html += '<rect '+rect(26,10,0.5,0.5)+' fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="1" rx="2" data-tip="Comedero G2"/>';
html += '<text x="'+tx(26.25)+'" y="'+ty(10.1)+'" fill="#06b6d4" font-size="7" text-anchor="middle">&#127847;</text>';
html += '<rect '+rect(28,10.5,0.5,0.5)+' fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="1" rx="2" data-tip="Bebedero G2"/>';

// ── Arboles interiores ──
[[5,12,1.5],[10,11,2.0]].forEach(function(t) {
  html += '<circle cx="'+tx(t[0])+'" cy="'+ty(t[1])+'" r="'+t[2]*S+'" fill="#4ade80" fill-opacity="0.15" stroke="#4ade80" stroke-width="1" data-tip="Arbol&#10;Radio ~'+t[2]+'m"/>';
  html += '<text x="'+tx(t[0])+'" y="'+ty(t[1]-0.15)+'" fill="#4ade80" font-size="10" text-anchor="middle">&#127794;</text>';
});

// ── Valla compartida G1/G2 ──
html += '<line x1="'+tx(25)+'" y1="'+ty(8)+'" x2="'+tx(25)+'" y2="'+ty(14)+'" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6 3" data-tip="Valla compartida G1/G2"/>';

// ══════════════════════════════════════
// CAMARAS
// ══════════════════════════════════════
function drawCamera(cx, cy, aimX, aimY, fovH, label, tip) {
  var px = tx(cx), py = ty(cy);
  var angle = Math.atan2(-(aimY - cy), aimX - cx);
  var halfFov = (fovH / 2) * Math.PI / 180;
  var reach = 8 * S;
  var a1 = -angle - halfFov;
  var a2 = -angle + halfFov;
  var ax1 = px + reach * Math.cos(a1), ay1 = py + reach * Math.sin(a1);
  var ax2 = px + reach * Math.cos(a2), ay2 = py + reach * Math.sin(a2);
  html += '<polygon points="'+px+','+py+' '+ax1+','+ay1+' '+ax2+','+ay2+'" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-width="0.5" stroke-dasharray="3 2"/>';
  html += '<circle cx="'+px+'" cy="'+py+'" r="6" fill="#ef4444" stroke="#fff" stroke-width="1.5" data-tip="'+tip+'"/>';
  html += '<text x="'+px+'" y="'+(py+3)+'" fill="#fff" font-size="8" text-anchor="middle">&#128247;</text>';
  html += '<text x="'+px+'" y="'+(py-10)+'" fill="#ef4444" font-size="8" text-anchor="middle" font-weight="bold">'+label+'</text>';
}

// CAM G1 — en fachada este de la sauna, mirando hacia el patio G1 (este/sur)
drawCamera(3.5, 11, 15, 5, 100, "CAM G1", "VIGI C340 — G1\n10.10.10.11\nFachada este sauna\nMira hacia patio G1");

// CAM G2 — en la esquina NE, mirando hacia la sauna (oeste/suroeste)
drawCamera(29, 8, 3.5, 11, 100, "CAM G2", "VIGI C340 — G2\n10.10.10.10\nEsquina NE\nMira hacia la sauna");

// ══════════════════════════════════════
// GALLINAS SINTETICAS
// ══════════════════════════════════════
// G1: 13 gallinas dispersas en la zona pegada al muro (y=9..13, x=4..23)
var g1Chickens = [
  [5,12],[7,11],[9,13],[11,10],[13,12],[15,11],[17,13],[19,10],[21,12],[8,9.5],[14,9],[18,11.5],[22,13]
];
g1Chickens.forEach(function(p) {
  html += '<text x="'+tx(p[0])+'" y="'+ty(p[1])+'" fill="#fbbf24" font-size="12" text-anchor="middle" opacity="0.8" data-tip="Gallina G1 (sintetica)">&#128020;</text>';
});

// G2: 12 gallinas en la esquina (x=25.5..29, y=9..13)
var g2Chickens = [
  [25.8,12],[26.5,11],[27.5,13],[28.5,12],[26,10],[27,10.5],[28,9.5],[29,11],[25.5,13],[27,12],[28.5,10],[26.5,9.5]
];
g2Chickens.forEach(function(p) {
  html += '<text x="'+tx(p[0])+'" y="'+ty(p[1])+'" fill="#60a5fa" font-size="12" text-anchor="middle" opacity="0.8" data-tip="Gallina G2 (sintetica)">&#128020;</text>';
});

// ── Labels ──
html += '<text x="'+tx(12)+'" y="'+ty(8.7)+'" fill="#22c55e" font-size="14" text-anchor="middle" font-weight="bold" opacity="0.6">GALLINERO I</text>';
html += '<text x="'+tx(12)+'" y="'+ty(8.1)+'" fill="#22c55e88" font-size="10" text-anchor="middle">13 aves — zona pegada al muro</text>';

html += '<text x="'+tx(27.5)+'" y="'+ty(8.7)+'" fill="#3b82f6" font-size="12" text-anchor="middle" font-weight="bold" opacity="0.7">G II</text>';
html += '<text x="'+tx(27.5)+'" y="'+ty(8.2)+'" fill="#3b82f688" font-size="9" text-anchor="middle">12 aves — esquina</text>';

// ── Dimension annotations ──
// 30m top
html += '<line x1="'+tx(0)+'" y1="'+ty(16.5)+'" x2="'+tx(30)+'" y2="'+ty(16.5)+'" stroke="#666" stroke-width="0.8" marker-start="url(#arr)" marker-end="url(#arr)"/>';
html += '<text x="'+tx(15)+'" y="'+ty(16.8)+'" fill="#999" font-size="9" text-anchor="middle">~30m</text>';

// Sauna height
html += '<line x1="'+tx(-0.8)+'" y1="'+ty(8)+'" x2="'+tx(-0.8)+'" y2="'+ty(14)+'" stroke="#666" stroke-width="0.8" marker-start="url(#arr)" marker-end="url(#arr)"/>';
html += '<text x="'+tx(-1.5)+'" y="'+ty(11)+'" fill="#999" font-size="8" text-anchor="middle">6m</text>';

// ── Title ──
html += '<text x="'+svgW/2+'" y="20" fill="#7fdbca" font-size="12" text-anchor="middle">Los Capones de Palacio — Plano General (escala 1:1 en metros)</text>';

// ── North arrow ──
html += '<g transform="translate('+tx(31)+','+ty(16)+')">';
html += '<polygon points="0,-20 -6,0 6,0" fill="#666"/>';
html += '<text x="0" y="14" fill="#666" font-size="10" text-anchor="middle" font-weight="bold">N</text>';
html += '</g>';

svg.innerHTML = html;
document.getElementById('container').appendChild(svg);

// Tooltips
var tip = document.getElementById('tip');
svg.addEventListener('mousemove', function(e) {
  var el = e.target;
  var t = el.getAttribute('data-tip') || (el.closest && el.closest('[data-tip]') && el.closest('[data-tip]').getAttribute('data-tip'));
  if (t) {
    tip.innerHTML = t.replace(/\n/g,'<br>');
    tip.style.display = 'block';
    tip.style.left = (e.clientX + 12) + 'px';
    tip.style.top = (e.clientY - 30) + 'px';
  } else {
    tip.style.display = 'none';
  }
});
svg.addEventListener('mouseleave', function() { tip.style.display = 'none'; });
</script>
</body>
</html>
