<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seedy — Plano 2D Gallineros Durrif</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1a2e; color:#eee; font-family:'Segoe UI',system-ui,sans-serif; }
  h1 { text-align:center; padding:12px; font-size:1.3em; color:#7fdbca; }
  .subtitle { text-align:center; color:#888; font-size:0.85em; margin-bottom:10px; }
  #container { display:flex; justify-content:center; padding:0 20px 20px; }
  svg { background:#0d1117; border-radius:12px; border:1px solid #333; max-width:100%; height:auto; }
  .legend { position:fixed; bottom:10px; right:10px; background:#0d1117dd; border:1px solid #444; border-radius:8px; padding:10px; font-size:0.75em; }
  .legend div { display:flex; align-items:center; gap:6px; margin:3px 0; }
  .legend .swatch { width:14px; height:14px; border-radius:3px; border:1px solid #555; }
  .tooltip { position:fixed; background:#1e293b; color:#e2e8f0; padding:8px 12px; border-radius:6px; font-size:0.8em; pointer-events:none; display:none; border:1px solid #475569; z-index:100; max-width:250px; }
</style>
</head>
<body>
<h1>&#127793; Plano 2D — Gallineros Los Capones de Palacio</h1>
<p class="subtitle">Medidas reales del plano de David — 20 mar 2026 | Escala: 1m = 25px</p>
<div id="container"></div>
<div class="legend">
  <div><span class="swatch" style="background:#ef4444"></span> Cámaras VIGI</div>
  <div><span class="swatch" style="background:#22c55e44;border-color:#22c55e"></span> G1 — Zona amplia</div>
  <div><span class="swatch" style="background:#3b82f644;border-color:#3b82f6"></span> G2 — Parque + caseta</div>
  <div><span class="swatch" style="background:#a78bfa44;border-color:#a78bfa"></span> Sauna</div>
  <div><span class="swatch" style="background:#f59e0b44;border-color:#f59e0b"></span> Casetas/nidos</div>
  <div><span class="swatch" style="background:#06b6d444;border-color:#06b6d4"></span> Comederos/bebederos</div>
  <div><span class="swatch" style="background:#4ade80"></span> Árboles</div>
  <div><span class="swatch" style="background:#78716c44;border-color:#78716c"></span> Composteros</div>
</div>
<div class="tooltip" id="tip"></div>

<script>
const S = 25; // px per meter
const PAD = 40;
const W = 32, H = 16; // meters
const svgW = W*S + PAD*2, svgH = H*S + PAD*2;

// Flip Y: plan origin bottom-left, SVG origin top-left
const tx = (x) => PAD + x * S;
const ty = (y) => PAD + (H - y) * S;

function pts(arr) { return arr.map(([x,y]) => `${tx(x)},${ty(y)}`).join(' '); }
function rect(x, y, w, h) { return `x="${tx(x)}" y="${ty(y+h)}" width="${w*S}" height="${h*S}"`; }

const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
svg.setAttribute('width', svgW);
svg.setAttribute('height', svgH);

let html = '';

// ── Grid ──
for (let i = 0; i <= W; i++) {
  const x = tx(i);
  html += `<line x1="${x}" y1="${ty(0)}" x2="${x}" y2="${ty(H)}" stroke="#222" stroke-width="0.5"/>`;
  if (i % 5 === 0) html += `<text x="${x}" y="${ty(-0.3)}" fill="#555" font-size="9" text-anchor="middle">${i}m</text>`;
}
for (let j = 0; j <= H; j++) {
  const y = ty(j);
  html += `<line x1="${tx(0)}" y1="${y}" x2="${tx(W)}" y2="${y}" stroke="#222" stroke-width="0.5"/>`;
  if (j % 5 === 0) html += `<text x="${tx(-0.5)}" y="${y+3}" fill="#555" font-size="9" text-anchor="end">${j}m</text>`;
}

// ── Perímetro (valla azul) ──
const perim = [[0,0],[0,14],[3.5,14],[3.5,8.5],[8.5,8.5],[8.5,14],[25,14],[25,8],[30,8],[30,0],[25,0],[25,6],[15,0]];
html += `<polygon points="${pts(perim)}" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round" opacity="0.7"/>`;

// ── Gallinero I — patio (zona verde) ──
const g1Patio = [[3.5,8.5],[8.5,8.5],[8.5,14],[25,14],[25,8],[30,8],[30,0],[25,0],[25,6],[15,0],[0,0],[0,8],[3.5,8]];
html += `<polygon points="${pts(g1Patio)}" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-width="1" stroke-dasharray="4 2" data-tip="Gallinero I — Zona amplia&#10;~95 m² | 13 aves"/>`;

// ── Gallinero II — parque ──
html += `<rect ${rect(25,6,5,2.5)} fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 2" data-tip="Parque G2&#10;5m × 2.5m = 12.5 m²"/>`;

// ── Sauna ──
html += `<rect ${rect(0,8,3.5,6)} fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-width="1.5" rx="3" data-tip="Sauna&#10;3.5m × 6m | Edificio madera&#10;Cámara G1 en fachada este"/>`;
html += `<text x="${tx(1.75)}" y="${ty(11)}" fill="#a78bfa" font-size="11" text-anchor="middle" font-weight="bold">SAUNA</text>`;

// ── Caseta G2 (elevada) ──
html += `<rect ${rect(25.5,12,1.5,2)} fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="1.5" rx="2" data-tip="Caseta G2 (elevada)&#10;1.5m × 2m | Nidos arriba&#10;Descanso debajo"/>`;
html += `<text x="${tx(26.25)}" y="${ty(12.8)}" fill="#f59e0b" font-size="8" text-anchor="middle">Caseta G2</text>`;
html += `<text x="${tx(26.25)}" y="${ty(12.4)}" fill="#f59e0b88" font-size="7" text-anchor="middle">1.5×2m</text>`;

// ── Tejado G2 ──
html += `<rect ${rect(25,11,4,3)} fill="none" stroke="#f59e0b" stroke-width="0.8" stroke-dasharray="3 3" rx="2" data-tip="Tejado G2&#10;4m × 3m | Protección lluvia"/>`;
html += `<text x="${tx(27)}" y="${ty(13.5)}" fill="#f59e0b55" font-size="7" text-anchor="middle">tejado 4×3</text>`;

// ── Caseta esquina sauna (G1) ──
html += `<rect ${rect(3.5,13,1,1)} fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="1.5" rx="2" data-tip="Caseta esquina sauna&#10;1m × 1m | Nido G1"/>`;
html += `<text x="${tx(4)}" y="${ty(13.3)}" fill="#f59e0b" font-size="7" text-anchor="middle">1×1</text>`;

// ── Caseta junto a G2 (G1) ──
html += `<rect ${rect(23.5,7.5,1.5,0.7)} fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="1.5" rx="2" data-tip="Caseta junto a G2&#10;1.5m × 0.7m | Nido G1"/>`;
html += `<text x="${tx(24.25)}" y="${ty(7.7)}" fill="#f59e0b" font-size="7" text-anchor="middle">1.5×0.7</text>`;

// ── Composteros ──
html += `<rect ${rect(12,10,4,2)} fill="#78716c" fill-opacity="0.15" stroke="#78716c" stroke-width="1" rx="2" data-tip="Composteros&#10;4m × 2m"/>`;
html += `<text x="${tx(14)}" y="${ty(10.8)}" fill="#78716c" font-size="9" text-anchor="middle">Composteros</text>`;

// ── Comederos / Bebederos ──
html += `<rect ${rect(10,3,1,1)} fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="1" rx="2" data-tip="Comedero G1&#10;Tolva metálica"/>`;
html += `<text x="${tx(10.5)}" y="${ty(3.3)}" fill="#06b6d4" font-size="7" text-anchor="middle">&#127847;</text>`;

html += `<rect ${rect(13,2,0.5,0.5)} fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="1" rx="2" data-tip="Bebedero G1"/>`;
html += `<text x="${tx(13.25)}" y="${ty(2.1)}" fill="#06b6d4" font-size="7" text-anchor="middle">&#128167;</text>`;

html += `<rect ${rect(26,7,0.5,0.5)} fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="1" rx="2" data-tip="Comedero G2"/>`;
html += `<text x="${tx(26.25)}" y="${ty(7.1)}" fill="#06b6d4" font-size="7" text-anchor="middle">&#127847;</text>`;

html += `<rect ${rect(28,7.5,0.5,0.5)} fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="1" rx="2" data-tip="Bebedero G2"/>`;
html += `<text x="${tx(28.25)}" y="${ty(7.6)}" fill="#06b6d4" font-size="7" text-anchor="middle">&#128167;</text>`;

// ── Árboles ──
[[5,12,1.5],[10,11,2.0]].forEach(([cx,cy,r]) => {
  html += `<circle cx="${tx(cx)}" cy="${ty(cy)}" r="${r*S}" fill="#4ade80" fill-opacity="0.15" stroke="#4ade80" stroke-width="1" data-tip="Árbol&#10;Radio ~${r}m"/>`;
  html += `<text x="${tx(cx)}" y="${ty(cy)+4}" fill="#4ade80" font-size="10" text-anchor="middle">&#127794;</text>`;
});

// ── Valla compartida G1/G2 ──
html += `<line x1="${tx(25)}" y1="${ty(6)}" x2="${tx(25)}" y2="${ty(14)}" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6 3" data-tip="Valla compartida G1/G2&#10;A veces saltan 1-2 aves"/>`;

// ── Cámaras (en ROJO) ──
function drawCamera(cx, cy, aimX, aimY, fovH, label, tip) {
  const px = tx(cx), py = ty(cy);
  const angle = Math.atan2(-(aimY - cy), aimX - cx); // note Y flip
  const halfFov = (fovH / 2) * Math.PI / 180;
  const reach = 8 * S; // 8m FOV reach
  const a1 = -angle - halfFov;
  const a2 = -angle + halfFov;
  const ax1 = px + reach * Math.cos(a1), ay1 = py + reach * Math.sin(a1);
  const ax2 = px + reach * Math.cos(a2), ay2 = py + reach * Math.sin(a2);

  // FOV cone
  html += `<polygon points="${px},${py} ${ax1},${ay1} ${ax2},${ay2}" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-width="0.5" stroke-dasharray="3 2"/>`;
  // Camera icon
  html += `<circle cx="${px}" cy="${py}" r="6" fill="#ef4444" stroke="#fff" stroke-width="1.5" data-tip="${tip}"/>`;
  html += `<text x="${px}" y="${py+3}" fill="#fff" font-size="8" text-anchor="middle">&#128247;</text>`;
  html += `<text x="${px}" y="${py-10}" fill="#ef4444" font-size="8" text-anchor="middle" font-weight="bold">${label}</text>`;
}

// Camera G1: on SAUNA east wall
drawCamera(3.5, 11, 15, 5, 100, "CAM G1", "VIGI C340 — G1\n10.10.10.11\nFachada este sauna\n4K 3840×2160");
// Camera G2: north side of G2 park
drawCamera(27.5, 13.5, 27.5, 8, 100, "CAM G2", "VIGI C340 — G2\n10.10.10.10\nNorte del parque G2\n4K 3840×2160");

// ── Labels ──
html += `<text x="${tx(12)}" y="${ty(5)}" fill="#22c55e" font-size="14" text-anchor="middle" font-weight="bold" opacity="0.6">GALLINERO I</text>`;
html += `<text x="${tx(12)}" y="${ty(4.2)}" fill="#22c55e88" font-size="10" text-anchor="middle">13 aves — zona amplia</text>`;

html += `<text x="${tx(27.5)}" y="${ty(9.5)}" fill="#3b82f6" font-size="12" text-anchor="middle" font-weight="bold" opacity="0.7">G II</text>`;
html += `<text x="${tx(27.5)}" y="${ty(8.9)}" fill="#3b82f688" font-size="9" text-anchor="middle">12 aves</text>`;

// ── Dimension annotations ──
function dimLine(x1,y1,x2,y2, label, offset=0.4) {
  const mx = (tx(x1)+tx(x2))/2, my = (ty(y1)+ty(y2))/2;
  html += `<line x1="${tx(x1)}" y1="${ty(y1)}" x2="${tx(x2)}" y2="${ty(y2)}" stroke="#666" stroke-width="0.8" marker-start="url(#arr)" marker-end="url(#arr)"/>`;
  html += `<text x="${mx}" y="${my-4}" fill="#999" font-size="8" text-anchor="middle">${label}</text>`;
}

// Arrow marker
html += `<defs><marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,1 L6,3 L0,5" fill="#666"/></marker></defs>`;

// 30m top
dimLine(0,15.2,30,15.2,"~30m");
// Sauna 3.5m
dimLine(-0.8,8,-0.8,14,"6m");
// G2 park 5m
dimLine(25,5.5,30,5.5,"5m");
// G2 park 2.5m
dimLine(30.5,6,30.5,8.5,"2.5m");

// ── Title block ──
html += `<text x="${svgW/2}" y="20" fill="#7fdbca" font-size="12" text-anchor="middle">Los Capones de Palacio — Plano General (escala 1:1 en metros)</text>`;

svg.innerHTML = html;
document.getElementById('container').appendChild(svg);

// ── Tooltips ──
const tip = document.getElementById('tip');
svg.addEventListener('mousemove', e => {
  const el = e.target;
  const t = el.getAttribute('data-tip') || el.closest('[data-tip]')?.getAttribute('data-tip');
  if (t) {
    tip.innerHTML = t.replace(/\n/g,'<br>');
    tip.style.display = 'block';
    tip.style.left = (e.clientX + 12) + 'px';
    tip.style.top = (e.clientY - 30) + 'px';
  } else {
    tip.style.display = 'none';
  }
});
svg.addEventListener('mouseleave', () => tip.style.display = 'none');
</script>
</body>
</html>
