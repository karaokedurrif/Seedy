<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seedy — Plano 2D Gallineros Durrif</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e14;color:#eee;font-family:'Segoe UI',system-ui,sans-serif}
  h1{text-align:center;padding:12px;font-size:1.3em;color:#7fdbca}
  .sub{text-align:center;color:#666;font-size:0.8em;margin-bottom:8px}
  #container{display:flex;justify-content:center;padding:0 16px 16px}
  svg{background:#0d1117;border-radius:12px;border:1px solid #1e293b;max-width:100%;height:auto}
  .legend{position:fixed;bottom:10px;right:10px;background:#0d1117ee;border:1px solid #334155;border-radius:10px;padding:10px 14px;font-size:0.72em;backdrop-filter:blur(6px)}
  .legend div{display:flex;align-items:center;gap:6px;margin:3px 0;color:#94a3b8}
  .legend .sw{width:13px;height:13px;border-radius:3px;border:1px solid #475569}
  .tip{position:fixed;background:#1e293bee;color:#e2e8f0;padding:8px 12px;border-radius:8px;font-size:0.78em;pointer-events:none;display:none;border:1px solid #475569;z-index:100;max-width:260px;backdrop-filter:blur(4px);line-height:1.4}
</style>
</head>
<body>
<h1>Los Capones de Palacio &mdash; Plano General</h1>
<p class="sub">Medidas reales &middot; Escala 1m = 25px</p>
<div id="container"></div>
<div class="legend">
  <div><span class="sw" style="background:#22c55e30;border-color:#22c55e"></span> Gallinero I &mdash; zona principal</div>
  <div><span class="sw" style="background:#3b82f630;border-color:#3b82f6"></span> Gallinero II &mdash; recinto cerrado</div>
  <div><span class="sw" style="background:#78716c40;border-color:#78716c"></span> Muro &amp; talud con arboles</div>
  <div><span class="sw" style="background:#a78bfa25;border-color:#a78bfa"></span> Sauna</div>
  <div><span class="sw" style="background:#f59e0b40;border-color:#f59e0b"></span> Casetas / habitaculos</div>
  <div><span class="sw" style="background:#8b1a1a50;border-color:#dc2626"></span> Campo de vision camara</div>
  <div><span class="sw" style="background:#ef4444"></span> Camara activa (VIGI)</div>
  <div><span class="sw" style="background:#f59e0b"></span> Camara offline (Dahua)</div>
</div>
<div class="tip" id="tip"></div>

<script>
var S=25, PAD=50, W=32, H=18;
var svgW=W*S+PAD*2, svgH=H*S+PAD*2;
var tx=function(x){return PAD+x*S};
var ty=function(y){return PAD+(H-y)*S};
function pts(a){return a.map(function(p){return tx(p[0])+','+ty(p[1])}).join(' ')}
function r(x,y,w,h){return 'x="'+tx(x)+'" y="'+ty(y+h)+'" width="'+w*S+'" height="'+h*S+'"'}

var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
svg.setAttribute('viewBox','0 0 '+svgW+' '+svgH);
svg.setAttribute('width',svgW);
svg.setAttribute('height',svgH);
var d='';

// defs
d+='<defs>';
d+='<marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,1 L6,3 L0,5" fill="#555"/></marker>';
d+='</defs>';

// Grid
for(var i=0;i<=W;i++){d+='<line x1="'+tx(i)+'" y1="'+ty(-1)+'" x2="'+tx(i)+'" y2="'+ty(H)+'" stroke="#151d28" stroke-width="0.5"/>';if(i%5===0)d+='<text x="'+tx(i)+'" y="'+ty(-0.5)+'" fill="#334155" font-size="9" text-anchor="middle">'+i+'m</text>'}
for(var j=0;j<=H;j++){d+='<line x1="'+tx(-1)+'" y1="'+ty(j)+'" x2="'+tx(W)+'" y2="'+ty(j)+'" stroke="#151d28" stroke-width="0.5"/>';if(j%5===0)d+='<text x="'+tx(-0.8)+'" y="'+(ty(j)+3)+'" fill="#334155" font-size="9" text-anchor="end">'+j+'m</text>'}

// ═══════════════════════════════════════
// MURO NORTE (30m, y=14..15.5)
// ═══════════════════════════════════════
d+='<rect '+r(0,14,30,1.5)+' fill="#78716c" fill-opacity="0.18" stroke="#78716c" stroke-width="1.5" data-tip="Muro de piedra con talud&#10;30m de largo, ~1.5m alto&#10;Arboles en la parte superior"/>';
d+='<text x="'+tx(15)+'" y="'+ty(14.7)+'" fill="#78716c" font-size="9" text-anchor="middle" letter-spacing="2">MURO CON TALUD Y ARBOLES &mdash; 30m</text>';
for(i=0;i<15;i++){var cx=1+i*2;d+='<circle cx="'+tx(cx)+'" cy="'+ty(15.3)+'" r="'+S*0.6+'" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.3" stroke-width="0.5"/>'}

// ═══════════════════════════════════════
// PROPERTY BOUNDARY (perimeter fence)
// ═══════════════════════════════════════
var perim=[[0,0],[0,14],[30,14],[30,0],[25,0],[25,6],[15,0]];
d+='<polygon points="'+pts(perim)+'" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.4" stroke-linejoin="round"/>';

// ═══════════════════════════════════════
// GALLINERO I — zona principal (verde)
// Zona grande entre sauna y G II, pegada al muro
// ═══════════════════════════════════════
var g1=[[0,8],[0,14],[25,14],[25,8]];
d+='<polygon points="'+pts(g1)+'" fill="#22c55e" fill-opacity="0.06" stroke="#22c55e" stroke-width="1.5" stroke-linejoin="round" data-tip="Gallinero I — Zona principal&#10;Recinto principal de cria&#10;~150m2 | 13 aves (censo)&#10;Incluye sauna + pasillo + patio"/>';

// G I labels
d+='<text x="'+tx(12)+'" y="'+ty(12.3)+'" fill="#22c55e" font-size="18" text-anchor="middle" font-weight="bold" opacity="0.35">G I</text>';
d+='<text x="'+tx(6)+'" y="'+ty(10.5)+'" fill="#22c55e" font-size="13" text-anchor="middle" font-weight="bold" opacity="0.25">G I</text>';

// ═══════════════════════════════════════
// GALLINERO II — recinto cerrado (derecha)
// ═══════════════════════════════════════
var g2=[[25,0],[25,14],[30,14],[30,0]];
d+='<polygon points="'+pts(g2)+'" fill="#3b82f6" fill-opacity="0.05" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round" data-tip="Gallinero II — Recinto cerrado&#10;5m x 14m vallado&#10;12 aves (censo)&#10;Caseta elevada + parque"/>';

// G II label
d+='<text x="'+tx(27.5)+'" y="'+ty(10)+'" fill="#3b82f6" font-size="13" text-anchor="middle" font-weight="bold" opacity="0.5">G II</text>';
d+='<text x="'+tx(27.5)+'" y="'+ty(9.3)+'" fill="#3b82f6" font-size="9" text-anchor="middle" opacity="0.35">12 aves</text>';

// G I/G II separator fence
d+='<line x1="'+tx(25)+'" y1="'+ty(0)+'" x2="'+tx(25)+'" y2="'+ty(14)+'" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6 3" opacity="0.5" data-tip="Valla separadora G I / G II"/>';

// ═══════════════════════════════════════
// HUERTO (zona inferior — sin gallinas)
// ═══════════════════════════════════════
var huerto=[[0,0],[0,8],[25,8],[25,6],[15,0]];
d+='<polygon points="'+pts(huerto)+'" fill="#1a2e1a" fill-opacity="0.15" stroke="none"/>';
d+='<text x="'+tx(10)+'" y="'+ty(5)+'" fill="#4b5563" font-size="12" text-anchor="middle" font-weight="bold">HUERTO</text>';
d+='<text x="'+tx(10)+'" y="'+ty(4.2)+'" fill="#374151" font-size="8" text-anchor="middle">aqui no entran gallinas</text>';
d+='<text x="'+tx(10)+'" y="'+ty(3.5)+'" fill="#374151" font-size="8" text-anchor="middle">salvo alguna que se escapa</text>';

// ═══════════════════════════════════════
// SAUNA (edificio, esquina NO)
// ═══════════════════════════════════════
d+='<rect '+r(0,8,3.5,6)+' fill="#a78bfa" fill-opacity="0.10" stroke="#a78bfa" stroke-width="1.8" rx="2" data-tip="Sauna&#10;3.5m x 6m | Edificio madera&#10;Camara Dahua al lado"/>';
d+='<text x="'+tx(1.75)+'" y="'+ty(11.2)+'" fill="#a78bfa" font-size="12" text-anchor="middle" font-weight="bold">SAUNA</text>';
d+='<text x="'+tx(1.75)+'" y="'+ty(10.4)+'" fill="#a78bfa" font-size="8" text-anchor="middle" opacity="0.5">3.5 x 6m</text>';

// ═══════════════════════════════════════
// CASETAS / HABITACULOS
// ═══════════════════════════════════════
// Caseta 1: hace esquina con la sauna (pegada al muro)
d+='<rect '+r(3.5,13,1.5,1)+' fill="#22c55e" fill-opacity="0.25" stroke="#22c55e" stroke-width="1.5" rx="2" data-tip="Habitaculo 1 (G I)&#10;Hace esquina con la sauna&#10;Pegado al muro&#10;~1.5 x 1m"/>';

// Caseta 2: cerca del habitaculo del G II (pegada al muro)
d+='<rect '+r(21,13,2,1.2)+' fill="#22c55e" fill-opacity="0.25" stroke="#22c55e" stroke-width="1.5" rx="2" data-tip="Habitaculo 2 (G I)&#10;Cerca del recinto G II&#10;Pegado al muro&#10;~2 x 1.2m"/>';

// Caseta G II (elevada) — dentro del recinto
d+='<rect '+r(25.5,11.5,3.5,2.5)+' fill="#22c55e" fill-opacity="0.25" stroke="#22c55e" stroke-width="1.5" rx="2" data-tip="Caseta Gallinero II&#10;Estructura con tejado&#10;Caseta elevada 1.5x2m&#10;Tejado 3.5x2.5m"/>';
d+='<text x="'+tx(27.25)+'" y="'+ty(12.6)+'" fill="#22c55e" font-size="7" text-anchor="middle" opacity="0.5">caseta G II</text>';

// ═══════════════════════════════════════
// COMEDEROS / BEBEDEROS (pequeños iconos)
// ═══════════════════════════════════════
[[7,12,'Comedero G1'],[10,11,'Comedero G1'],[15,10,'Bebedero G1'],[27,8,'Comedero G2'],[28.5,9,'Bebedero G2']].forEach(function(c){
  d+='<rect '+r(c[0]-0.2,c[1]-0.2,0.4,0.4)+' fill="#475569" fill-opacity="0.4" stroke="#64748b" stroke-width="0.5" rx="1" data-tip="'+c[2]+'"/>';
});

// ═══════════════════════════════════════
// G I/Huerto internal fence
// ═══════════════════════════════════════
d+='<line x1="'+tx(3.5)+'" y1="'+ty(8)+'" x2="'+tx(25)+'" y2="'+ty(8)+'" stroke="#ffffff" stroke-width="1.8" opacity="0.3" data-tip="Valla interna G I / Huerto"/>';

// ═══════════════════════════════════════
// CAMERAS + FOV CONES
// ═══════════════════════════════════════
function drawCam(cx,cy,aimX,aimY,fovDeg,reachM,label,tip,color,offline){
  var px=tx(cx),py=ty(cy);
  var angle=Math.atan2(-(aimY-cy),aimX-cx);
  var hf=(fovDeg/2)*Math.PI/180;
  var rm=reachM*S;
  var a1=-angle-hf, a2=-angle+hf;
  // FOV cone fill — dark maroon
  d+='<polygon points="'+px+','+py+' '+(px+rm*Math.cos(a1))+','+(py+rm*Math.sin(a1))+' '+(px+rm*Math.cos(a2))+','+(py+rm*Math.sin(a2))+'" fill="#7f1d1d" fill-opacity="0.18" stroke="#dc2626" stroke-width="0.5" stroke-dasharray="4 2" opacity="0.8"/>';
  // Camera dot
  d+='<circle cx="'+px+'" cy="'+py+'" r="7" fill="'+(offline?'#f59e0b':'#ef4444')+'" stroke="#fff" stroke-width="2" data-tip="'+tip+'"/>';
  d+='<text x="'+px+'" y="'+(py+3)+'" fill="#fff" font-size="7" text-anchor="middle" font-weight="bold">'+(offline?'D':'V')+'</text>';
  // Label
  d+='<text x="'+px+'" y="'+(py-12)+'" fill="'+(offline?'#f59e0b':'#ef4444')+'" font-size="9" text-anchor="middle" font-weight="bold">'+label+'</text>';
  if(offline) d+='<text x="'+px+'" y="'+(py-3-22)+'" fill="#f59e0b88" font-size="7" text-anchor="middle">(offline)</text>';
}

// Camara Sauna (Dahua) — al lado de la sauna, mirando SE dentro de G I — NO CONECTADA
drawCam(3, 11, 15, 5, 100, 10, 'Cam. Sauna', 'Camara Dahua (Sauna)\nAl lado de la sauna\nMira hacia G I\nNO CONECTADA AUN', '#f59e0b', true);

// Camara Nueva (VIGI G1, 10.10.10.11) — lateral del edificio G II, mirando hacia la sauna
drawCam(25, 12, 3.5, 11, 100, 18, 'Cam. Nueva', 'VIGI C340 — G1\n10.10.10.11\nLateral edificio G II\nMira hacia la sauna (~20m)', '#ef4444', false);

// Camara G II (VIGI G2, 10.10.10.10) — dentro de G II, apuntando al recinto
drawCam(27.5, 13.5, 27.5, 5, 100, 8, 'Cam. G II', 'VIGI C340 — G2\n10.10.10.10\nDentro del recinto G II\nApuntando al parque sur', '#ef4444', false);

// ═══════════════════════════════════════
// DIMENSION LINES
// ═══════════════════════════════════════
// 30m top
d+='<line x1="'+tx(0)+'" y1="'+ty(16)+'" x2="'+tx(30)+'" y2="'+ty(16)+'" stroke="#475569" stroke-width="0.8" marker-start="url(#arr)" marker-end="url(#arr)"/>';
d+='<text x="'+tx(15)+'" y="'+ty(16.3)+'" fill="#64748b" font-size="9" text-anchor="middle">~30m</text>';

// Sauna 6m
d+='<line x1="'+tx(-1)+'" y1="'+ty(8)+'" x2="'+tx(-1)+'" y2="'+ty(14)+'" stroke="#475569" stroke-width="0.8" marker-start="url(#arr)" marker-end="url(#arr)"/>';
d+='<text x="'+tx(-1.7)+'" y="'+ty(11)+'" fill="#64748b" font-size="8" text-anchor="middle">6m</text>';

// G II 5m
d+='<line x1="'+tx(25)+'" y1="'+ty(-0.8)+'" x2="'+tx(30)+'" y2="'+ty(-0.8)+'" stroke="#475569" stroke-width="0.8" marker-start="url(#arr)" marker-end="url(#arr)"/>';
d+='<text x="'+tx(27.5)+'" y="'+ty(-1.2)+'" fill="#64748b" font-size="8" text-anchor="middle">5m</text>';

// ═══════════════════════════════════════
// TITLE + COMPASS
// ═══════════════════════════════════════
d+='<text x="'+svgW/2+'" y="22" fill="#7fdbca" font-size="12" text-anchor="middle">Los Capones de Palacio &mdash; Plano General (escala 1:1 en metros)</text>';

// North compass
d+='<g transform="translate('+(svgW-40)+',50)">';
d+='<polygon points="0,-18 -5,0 5,0" fill="#475569"/>';
d+='<polygon points="0,-18 0,0 5,0" fill="#334155"/>';
d+='<text x="0" y="14" fill="#64748b" font-size="10" text-anchor="middle" font-weight="bold">N</text>';
d+='</g>';

svg.innerHTML=d;
document.getElementById('container').appendChild(svg);

// Tooltip
var tip=document.getElementById('tip');
svg.addEventListener('mousemove',function(e){
  var el=e.target;
  var t=el.getAttribute('data-tip')||(el.closest&&el.closest('[data-tip]')&&el.closest('[data-tip]').getAttribute('data-tip'));
  if(t){tip.innerHTML=t.replace(/\n/g,'<br>');tip.style.display='block';tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY-30)+'px'}
  else tip.style.display='none';
});
svg.addEventListener('mouseleave',function(){tip.style.display='none'});
</script>
</body>
</html>
