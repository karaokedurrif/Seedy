<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Capones de Palacio &mdash; Plano General 2D</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e17;color:#e0e0e0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow:hidden;height:100vh}
  #header{position:fixed;top:0;left:0;right:0;z-index:100;background:linear-gradient(180deg,rgba(10,14,23,.97),rgba(10,14,23,.8));padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(34,197,94,.3);backdrop-filter:blur(10px)}
  #header h1{font-size:17px;font-weight:700;background:linear-gradient(135deg,#22c55e,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  #header .sub{font-size:11px;color:#6b7280;margin-top:1px}
  .ctrls{display:flex;gap:6px;align-items:center}
  .ctrls button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#e0e0e0;padding:5px 12px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:500;transition:.2s}
  .ctrls button:hover{background:rgba(34,197,94,.2);border-color:#22c55e}
  .ctrls button.on{background:rgba(34,197,94,.3);border-color:#22c55e;color:#22c55e}
  .scale-txt{font-size:10px;color:#9ca3af}
  #wrap{width:100vw;height:100vh;cursor:grab;overflow:hidden;position:relative}
  #wrap:active{cursor:grabbing}
  #wrap svg{position:absolute;top:0;left:0}
  #legend{position:fixed;bottom:14px;left:14px;z-index:100;background:rgba(10,14,23,.92);border:1px solid rgba(255,255,255,.1);border-radius:11px;padding:12px 16px;min-width:220px;backdrop-filter:blur(10px);font-size:11px}
  #legend h3{font-size:12px;font-weight:600;color:#22c55e;margin-bottom:6px}
  .li{display:flex;align-items:center;gap:7px;margin:3px 0}
  .lc{width:14px;height:14px;border-radius:3px;flex-shrink:0}
  #info{position:fixed;bottom:14px;right:14px;z-index:100;background:rgba(10,14,23,.92);border:1px solid rgba(255,255,255,.1);border-radius:11px;padding:12px 16px;min-width:250px;max-width:310px;backdrop-filter:blur(10px);font-size:11px;display:none}
  #info h3{font-size:13px;font-weight:600;margin-bottom:5px}
  #info .d{color:#9ca3af;margin:2px 0}
  #zc{position:fixed;top:60px;right:14px;z-index:100;display:flex;flex-direction:column;gap:3px}
  #zc button{width:34px;height:34px;border-radius:7px;background:rgba(10,14,23,.9);border:1px solid rgba(255,255,255,.15);color:#e0e0e0;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
  #zc button:hover{background:rgba(34,197,94,.2);border-color:#22c55e}
  #zlev{text-align:center;font-size:9px;color:#6b7280}
  .hi:hover{filter:brightness(1.3);cursor:pointer}
  #compass{position:fixed;top:60px;left:14px;z-index:100;width:46px;height:46px}
  /* ── Day/Light theme ── */
  body.day{background:#e8e4df;color:#1a1a1a}
  body.day #header{background:linear-gradient(180deg,rgba(245,243,240,.97),rgba(245,243,240,.85));border-bottom-color:rgba(34,130,60,.3)}
  body.day #header .sub{color:#6b7280}
  body.day .ctrls button{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.15);color:#333}
  body.day .ctrls button:hover{background:rgba(34,197,94,.15);border-color:#22c55e}
  body.day .ctrls button.on{background:rgba(34,197,94,.2);border-color:#22c55e;color:#166534}
  body.day #legend{background:rgba(255,255,255,.92);border-color:rgba(0,0,0,.12);color:#333}
  body.day #legend h3{color:#166534}
  body.day #info{background:rgba(255,255,255,.92);border-color:rgba(0,0,0,.12);color:#333}
  body.day #info .d{color:#555}
  body.day #zc button{background:rgba(255,255,255,.9);border-color:rgba(0,0,0,.15);color:#333}
  body.day #zc button:hover{background:rgba(34,197,94,.15);border-color:#22c55e}
  body.day #zlev{color:#666}
  body.day .scale-txt{color:#666}
  /* SVG overrides */
  body.day #muro-bg{fill:#5a8a5a;stroke:#6b9a6b}
</style>
</head>
<body>
<div id="header">
  <div>
    <h1>&#x1F414; Los Capones de Palacio &mdash; Plano General</h1>
    <div class="sub">Medidas reales &middot; Escala 1m = 25px &middot; Digital Twin 2D &middot; 3 c&aacute;maras</div>
  </div>
  <div class="ctrls">
    <button id="b-cam" class="on" onclick="tgl('cam')">&#x1F4F9; C&aacute;maras</button>
    <button id="b-fov" class="on" onclick="tgl('fov')">&#x1F441; FOV</button>
    <button id="b-dim" onclick="tgl('dim')">&#x1F4CF; Medidas</button>
    <button id="b-ave" class="on" onclick="tgl('ave')">&#x1F413; Aves</button>
    <button id="b-grd" onclick="tgl('grd')">&#x229E; Grid</button>
    <button id="b-theme" onclick="toggleTheme()">&#x2600; D&iacute;a</button>
    <span class="scale-txt" id="zt">100%</span>
  </div>
</div>

<div id="zc">
  <button onclick="zi()">+</button>
  <div id="zlev">100%</div>
  <button onclick="zo()">&minus;</button>
  <button onclick="rv()" style="font-size:11px;margin-top:3px">&#x27F2;</button>
</div>

<svg id="compass" viewBox="0 0 50 50">
  <circle cx="25" cy="25" r="22" fill="rgba(10,14,23,.8)" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
  <polygon points="25,6 28,20 22,20" fill="#ef4444"/>
  <polygon points="25,44 22,30 28,30" fill="#6b7280"/>
  <text x="25" y="15" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="700">N</text>
  <text x="25" y="43" text-anchor="middle" fill="#6b7280" font-size="7">S</text>
  <text x="8" y="28" text-anchor="middle" fill="#6b7280" font-size="7">O</text>
  <text x="42" y="28" text-anchor="middle" fill="#6b7280" font-size="7">E</text>
</svg>

<div id="wrap">
<svg id="plan" viewBox="-60 -65 880 500" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
<defs>
  <pattern id="gp" width="25" height="25" patternUnits="userSpaceOnUse">
    <path d="M25 0L0 0 0 25" fill="none" stroke="rgba(255,255,255,.04)" stroke-width=".5"/>
  </pattern>
  <filter id="sh"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity=".5"/></filter>
  <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
    <path d="M0,1L6,3L0,5" fill="#64748b"/>
  </marker>
  <linearGradient id="gT" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1a1f10" stop-opacity=".3"/>
    <stop offset="100%" stop-color="#0f1008" stop-opacity=".45"/>
  </linearGradient>
  <!-- Prunus canopy gradient (pink flowers, March in Segovia) -->
  <radialGradient id="prunus" cx="50%" cy="40%" r="50%">
    <stop offset="0%" stop-color="#F0B0CC" stop-opacity=".85"/>
    <stop offset="70%" stop-color="#E8A0BF" stop-opacity=".65"/>
    <stop offset="100%" stop-color="#D88EAE" stop-opacity=".4"/>
  </radialGradient>
  <!-- Soil/dirt texture for parque areas -->
  <pattern id="soilPat" width="8" height="8" patternUnits="userSpaceOnUse">
    <rect width="8" height="8" fill="#2a1f10" opacity=".12"/>
    <circle cx="2" cy="3" r=".6" fill="#3a2f1a" opacity=".15"/>
    <circle cx="6" cy="7" r=".4" fill="#3a2f1a" opacity=".1"/>
  </pattern>
  <!-- Chicken silhouette symbol -->
  <symbol id="chicken" viewBox="0 0 20 20">
    <ellipse cx="10" cy="13" rx="6" ry="4.5" fill="currentColor"/>
    <circle cx="14" cy="8" r="3" fill="currentColor"/>
    <path d="M16,6 C17,4 18,5 17,6" fill="#CC3333"/>
    <circle cx="15" cy="7.5" r=".7" fill="#1a1a1a"/>
    <path d="M17,8 L19,8.5 L17,9" fill="#E8B030"/>
    <line x1="8" y1="17" x2="7" y2="20" stroke="#D4A017" stroke-width=".8"/>
    <line x1="12" y1="17" x2="13" y2="20" stroke="#D4A017" stroke-width=".8"/>
  </symbol>
  <!-- Rooster silhouette symbol (with tail feathers) -->
  <symbol id="rooster" viewBox="0 0 20 20">
    <ellipse cx="10" cy="13" rx="6" ry="4.5" fill="currentColor"/>
    <circle cx="14" cy="8" r="3" fill="currentColor"/>
    <path d="M16,5 C18,3 19,4 17.5,6" fill="#CC3333"/>
    <path d="M15,5 C16,3 17,2 16,5" fill="#CC3333"/>
    <circle cx="15" cy="7.5" r=".7" fill="#1a1a1a"/>
    <path d="M17,8 L19.5,8.5 L17,9.2" fill="#E8B030"/>
    <path d="M4,12 C1,10 0,8 3,11" fill="currentColor"/>
    <path d="M4,13 C0,12 -1,9 3,12" fill="currentColor"/>
    <line x1="8" y1="17" x2="7" y2="20" stroke="#D4A017" stroke-width=".8"/>
    <line x1="12" y1="17" x2="13" y2="20" stroke="#D4A017" stroke-width=".8"/>
  </symbol>
</defs>

<!-- ════════ GRID ════════ -->
<g id="l-grd" style="display:none">
  <rect x="-60" y="-65" width="880" height="500" fill="url(#gp)"/>
  <g fill="none" stroke="rgba(255,255,255,.07)" stroke-width=".5" stroke-dasharray="2,4">
    <line x1="0" y1="-40" x2="0" y2="400"/><line x1="125" y1="-40" x2="125" y2="400"/>
    <line x1="250" y1="-40" x2="250" y2="400"/><line x1="375" y1="-40" x2="375" y2="400"/>
    <line x1="500" y1="-40" x2="500" y2="400"/><line x1="625" y1="-40" x2="625" y2="400"/>
    <line x1="750" y1="-40" x2="750" y2="400"/>
    <line x1="-30" y1="0" x2="800" y2="0"/><line x1="-30" y1="125" x2="800" y2="125"/>
    <line x1="-30" y1="250" x2="800" y2="250"/><line x1="-30" y1="375" x2="800" y2="375"/>
  </g>
  <g font-size="8" fill="rgba(255,255,255,.18)" text-anchor="middle">
    <text x="0" y="-44">0m</text><text x="125" y="-44">5m</text><text x="250" y="-44">10m</text>
    <text x="375" y="-44">15m</text><text x="500" y="-44">20m</text><text x="625" y="-44">25m</text>
    <text x="750" y="-44">30m</text>
  </g>
</g>

<!-- ════════ MURO NORTE 30m ════════ -->
<rect id="muro-bg" x="-10" y="-28" width="770" height="38" rx="3" fill="#1a2e1a" stroke="#2d5a2d" stroke-width="1" opacity=".8"/>
<g opacity=".5">
  <circle cx="30" cy="-10" r="15" fill="#1e3a1e"/><circle cx="90" cy="-14" r="18" fill="#1e3a1e"/>
  <circle cx="155" cy="-8" r="13" fill="#234a23"/><circle cx="225" cy="-13" r="17" fill="#1e3a1e"/>
  <circle cx="305" cy="-10" r="15" fill="#234a23"/><circle cx="380" cy="-15" r="19" fill="#1e3a1e"/>
  <circle cx="455" cy="-9" r="14" fill="#234a23"/><circle cx="530" cy="-14" r="18" fill="#1e3a1e"/>
  <circle cx="610" cy="-10" r="15" fill="#234a23"/><circle cx="685" cy="-15" r="18" fill="#1e3a1e"/>
  <circle cx="740" cy="-8" r="12" fill="#234a23"/>
</g>
<text x="375" y="2" text-anchor="middle" font-size="9" fill="#4ade80" font-weight="600" letter-spacing="3">MURO CON TALUD Y &Aacute;RBOLES &mdash; 30m</text>

<!-- ════════ TERRAIN ════════ -->
<rect x="0" y="10" width="750" height="380" rx="0" fill="url(#gT)"/>

<!-- ════════════════════════════════════════════════════ -->
<!--  PARQUE GALLINERO I (perimetro ROJO)               -->
<!--  Forma: zona abierta 6m junto a sauna              -->
<!--  + transicion 6m + pasillo 2.5m a lo largo muro    -->
<!-- ════════════════════════════════════════════════════ -->
<polygon points="111,64 615,64 615,205 532,224 214,234 111,165"
  fill="rgba(239,68,68,.04)" stroke="#ef4444" stroke-width="2.5"
  class="hi" onclick="si('pGI')"/>
<!-- Relleno sutil zona abierta (L-shape west) -->
<polygon points="111,64 350,64 214,234 111,165"
  fill="rgba(34,197,94,.03)" stroke="none"/>
<!-- Etiqueta -->
<text x="200" y="150" text-anchor="middle" font-size="13" fill="#22c55e" font-weight="700" opacity=".35">PARQUE</text>
<text x="200" y="167" text-anchor="middle" font-size="13" fill="#22c55e" font-weight="700" opacity=".35">GALLINERO I</text>
<text x="450" y="100" text-anchor="middle" font-size="8" fill="#ef4444" opacity=".3">zona estrecha → transici&oacute;n diagonal</text>
<!-- ════════ VALLA PRINCIPAL interna (roja, 5 vertices) ════════ -->
<polyline points="106,165 214,234 234,114 545,132 615,202"
  fill="none" stroke="#dc2626" stroke-width="1.8" stroke-dasharray="6,3" opacity=".45"/>

<!-- ════════ SAUNA (3.5m E-O x 6m N-S, 4m alto) ════════ -->
<!-- Pared este (6m) da al parque GI. Pared sur sale del perimetro -->
<g class="hi" onclick="si('sauna')" filter="url(#sh)">
  <!-- Cuerpo principal -->
  <rect x="0" y="12" width="87" height="150" rx="4" fill="#5c3a1e" stroke="#8B6914" stroke-width="2"/>
  <rect x="0" y="12" width="87" height="150" rx="4" fill="rgba(92,58,30,.5)"/>
  <!-- Ventana (pared este) -->
  <rect x="72" y="45" width="15" height="25" rx="2" fill="rgba(135,206,235,.15)" stroke="#8B6914" stroke-width=".8"/>
  <!-- Puerta (pared sur, fuera del perimetro) -->
  <rect x="28" y="140" width="30" height="22" rx="2" fill="rgba(74,46,21,.8)" stroke="#8B6914" stroke-width="1.2"/>
  <line x1="43" y1="140" x2="43" y2="162" stroke="#6B4914" stroke-width=".5"/>
  <!-- Techo a dos aguas (cumbrera N-S) -->
  <line x1="0" y1="12" x2="-6" y2="90" stroke="#6B4914" stroke-width="1.5" opacity=".5"/>
  <line x1="87" y1="12" x2="93" y2="90" stroke="#6B4914" stroke-width="1.5" opacity=".5"/>
  <!-- Etiqueta vertical -->
  <text x="44" y="100" text-anchor="middle" font-size="15" fill="#f59e0b" font-weight="700"
    transform="rotate(-90,44,100)">SAUNA</text>
  <text x="44" y="135" text-anchor="middle" font-size="6.5" fill="#f59e0b" opacity=".7">3.5m &times; 6m</text>
</g>
<!-- Indicador: pared sur fuera del perimetro -->
<text x="44" y="175" text-anchor="middle" font-size="5.5" fill="#6b7280" opacity=".5">(fuera del per&iacute;metro)</text>





<!-- ════════ GALLINERO I CASETA (ex-hab2, 1.5m x 0.9m, pegado al muro) ════════ -->
<g class="hi" onclick="si('galI')" filter="url(#sh)">
  <rect x="530" y="12" width="37" height="22" rx="2" fill="#dbd7cf" stroke="#bbb" stroke-width="1.2"/>
  <rect x="530" y="12" width="37" height="22" rx="2" fill="rgba(200,196,190,.45)"/>
  <!-- Mini techo -->
  <line x1="530" y1="12" x2="548" y2="8" stroke="#8a8a8a" stroke-width="1"/>
  <line x1="548" y1="8" x2="567" y2="12" stroke="#8a8a8a" stroke-width="1"/>
  <!-- Puerta sur -->
  <rect x="542" y="27" width="10" height="7" rx="1" fill="rgba(180,175,168,.7)" stroke="#999" stroke-width=".6"/>
  <text x="548" y="24" text-anchor="middle" font-size="7" fill="#22c55e" font-weight="700">GI</text>
</g>
<text x="548" y="43" text-anchor="middle" font-size="5.5" fill="#22c55e" opacity=".5">Gallinero I</text>

<!-- ════════ COMPOSTERO (en zona abierta del parque GI) ════════ -->
<g class="hi" onclick="si('comp')" opacity=".55">
  <rect x="155" y="55" width="40" height="28" rx="3" fill="none" stroke="#8B6914" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="175" y="73" text-anchor="middle" font-size="6.5" fill="#8B6914">compostero</text>
</g>

<!-- ════════ VALLA SEPARADORA (N-S, entre GI y GII) ════════ -->
<g class="hi" onclick="si('valla')">
    <line x1="585" y1="10" x2="585" y2="280" stroke="#ef4444" stroke-width="2" stroke-dasharray="7,3" opacity=".4"/>
  <g fill="#8B4513" opacity=".7">
    <rect x="582" y="30" width="6" height="10" rx="1"/>
    <rect x="582" y="80" width="6" height="10" rx="1"/>
    <rect x="582" y="130" width="6" height="10" rx="1"/>
    <rect x="582" y="180" width="6" height="10" rx="1"/>
    <rect x="582" y="230" width="6" height="10" rx="1"/>
  </g>
  <text x="598" y="130" font-size="9" fill="#ef4444" font-weight="600" opacity=".5"
    transform="rotate(90,598,130)">VALLA</text>
</g>

<!-- ════════ CASETA GALLINERO II (~2.5m x 2m, puerta al SUR) ════════ -->
<g class="hi" onclick="si('galII')" filter="url(#sh)">
  <rect x="605" y="12" width="62" height="50" rx="3" fill="#dbd7cf" stroke="#bbb" stroke-width="1.5"/>
  <rect x="605" y="12" width="62" height="50" rx="3" fill="rgba(200,196,190,.45)"/>
  <!-- Ventana -->
  <rect x="612" y="22" width="16" height="11" rx="1" fill="rgba(135,206,235,.12)" stroke="#999" stroke-width=".7"/>
  <!-- Puerta sur -->
  <rect x="643" y="42" width="16" height="20" rx="2" fill="rgba(180,175,168,.8)" stroke="#999" stroke-width="1"/>
  <!-- Techo -->
  <polygon points="602,12 636,4 670,12" fill="#8a8a8a" stroke="#666" stroke-width="1"/>
  <!-- Etiqueta -->
  <rect x="608" y="26" width="52" height="13" rx="3" fill="rgba(59,130,246,.15)"/>
  <text x="634" y="36" text-anchor="middle" font-size="9" fill="#3b82f6" font-weight="700">GALL. II</text>
</g>

<!-- ════════ PARQUE GALLINERO II (azul, ~3m x 8m) ════════ -->
<rect x="595" y="64" width="75" height="200" rx="3"
  fill="rgba(59,130,246,.04)" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="8,4"
  class="hi" onclick="si('pGII')"/>
<!-- Hatch interior -->
<g opacity=".06" stroke="#3b82f6" stroke-width=".4">
  <line x1="595" y1="64" x2="670" y2="164"/><line x1="595" y1="114" x2="670" y2="214"/>
  <line x1="595" y1="164" x2="670" y2="264"/><line x1="615" y1="64" x2="670" y2="114"/>
  <line x1="635" y1="64" x2="670" y2="89"/>
  <line x1="595" y1="214" x2="650" y2="264"/>
</g>
<text x="632" y="155" text-anchor="middle" font-size="12" fill="#3b82f6" font-weight="700" opacity=".4">PARQUE</text>
<text x="632" y="170" text-anchor="middle" font-size="12" fill="#3b82f6" font-weight="700" opacity=".4">GII</text>

<text x="632" y="234" text-anchor="middle" font-size="6" fill="#4a5568">t&uacute;nel</text>

<!-- ════════ HUERTO (FUERA de perimetros, zona sur/oeste) ════════ -->
<g class="hi" onclick="si('huerto')">
  <rect x="0" y="175" width="580" height="190" rx="3" fill="rgba(101,67,33,.05)" stroke="#8B6914" stroke-width="1.2" stroke-dasharray="6,3"/>
  <!-- Bancales -->
  <rect x="20" y="200" width="65" height="22" rx="2" fill="none" stroke="#8B6914" stroke-width=".5" opacity=".35"/>
  <rect x="20" y="235" width="65" height="22" rx="2" fill="none" stroke="#8B6914" stroke-width=".5" opacity=".35"/>
  <rect x="100" y="200" width="65" height="22" rx="2" fill="none" stroke="#8B6914" stroke-width=".5" opacity=".35"/>
  <rect x="100" y="235" width="65" height="22" rx="2" fill="none" stroke="#8B6914" stroke-width=".5" opacity=".35"/>
  <rect x="180" y="200" width="65" height="22" rx="2" fill="none" stroke="#8B6914" stroke-width=".5" opacity=".35"/>
  <rect x="180" y="235" width="65" height="22" rx="2" fill="none" stroke="#8B6914" stroke-width=".5" opacity=".35"/>
  <text x="290" y="270" text-anchor="middle" font-size="18" fill="#8B6914" font-weight="700" opacity=".25">HUERTO</text>
  <text x="290" y="290" text-anchor="middle" font-size="7" fill="#8B6914" opacity=".2">Fuera del per&iacute;metro &mdash; sin acceso gallinas</text>
</g>

<!-- ════════ PRUNUS TREES along muro (pink flowers, March) ════════ -->
<g opacity=".75">
  <circle cx="50" cy="-8" r="18" fill="url(#prunus)"/>
  <circle cx="50" cy="-8" r="3" fill="#5C3D2E" opacity=".5"/>
  <circle cx="130" cy="-12" r="22" fill="url(#prunus)"/>

<script>
var wrap=document.getElementById('wrap'),svg=document.getElementById('plan');
var vb={x:-60,y:-65,w:880,h:500},pan=false,sx,sy;

// Embed mode: hide chrome when loaded inside iframe (?embed=1)
var isEmbed = new URLSearchParams(window.location.search).has('embed');
if (isEmbed) {
  var hdr = document.getElementById('header');
  var leg = document.getElementById('legend');
  var zcc = document.getElementById('zc');
  var comp = document.getElementById('compass');
  if (hdr) hdr.style.display = 'none';
  if (leg) leg.style.display = 'none';
  if (zcc) zcc.style.display = 'none';
  if (comp) comp.style.display = 'none';
}

function uv(){
  svg.setAttribute('viewBox',vb.x+' '+vb.y+' '+vb.w+' '+vb.h);
  var p=Math.round(880/vb.w*100);
  document.getElementById('zlev').textContent=p+'%';
  document.getElementById('zt').textContent=p+'%';
}

wrap.onmousedown=function(e){
  if(e.target.closest('.hi')||e.target.closest('button'))return;
  pan=true;sx=e.clientX;sy=e.clientY;
};
wrap.onmousemove=function(e){
  if(!pan)return;
  vb.x-=(e.clientX-sx)*(vb.w/wrap.clientWidth);
  vb.y-=(e.clientY-sy)*(vb.h/wrap.clientHeight);
  sx=e.clientX;sy=e.clientY;uv();
};
wrap.onmouseup=wrap.onmouseleave=function(){pan=false};

wrap.addEventListener('wheel',function(e){
  e.preventDefault();
  var f=e.deltaY>0?1.1:.9,nw=vb.w*f,nh=vb.h*f;
  if(nw<150||nw>3500)return;
  var mx=e.clientX/wrap.clientWidth,my=e.clientY/wrap.clientHeight;
  vb.x+=(vb.w-nw)*mx;vb.y+=(vb.h-nh)*my;
  vb.w=nw;vb.h=nh;uv();
});

var ltd=0;
wrap.addEventListener('touchstart',function(e){
  if(e.touches.length===1){pan=true;sx=e.touches[0].clientX;sy=e.touches[0].clientY}
  else if(e.touches.length===2){ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)}
});
wrap.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(e.touches.length===1&&pan){
    var dx=(e.touches[0].clientX-sx)*(vb.w/wrap.clientWidth);
    var dy=(e.touches[0].clientY-sy)*(vb.h/wrap.clientHeight);
    vb.x-=dx;vb.y-=dy;sx=e.touches[0].clientX;sy=e.touches[0].clientY;uv();
  }else if(e.touches.length===2){
    var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    var f=ltd/d,nw=vb.w*f,nh=vb.h*f;
    if(nw>150&&nw<3500){vb.x+=(vb.w-nw)*.5;vb.y+=(vb.h-nh)*.5;vb.w=nw;vb.h=nh;uv()}
    ltd=d;
  }
},{passive:false});
wrap.addEventListener('touchend',function(){pan=false});

function zi(){var f=.8,nw=vb.w*f,nh=vb.h*f;vb.x+=(vb.w-nw)*.5;vb.y+=(vb.h-nh)*.5;vb.w=nw;vb.h=nh;uv()}
function zo(){var f=1.25,nw=vb.w*f,nh=vb.h*f;vb.x+=(vb.w-nw)*.5;vb.y+=(vb.h-nh)*.5;vb.w=nw;vb.h=nh;uv()}
function rv(){vb={x:-60,y:-65,w:880,h:500};uv()}
function tgl(n){
  var e=document.getElementById('l-'+n),b=document.getElementById('b-'+n);
  if(!e)return;var v=e.style.display!=='none';
  e.style.display=v?'none':'';if(b)b.classList.toggle('on',!v);
}
function toggleTheme(){
  var d=document.body.classList.toggle('day');
  document.getElementById('b-theme').innerHTML=d?'&#x1F319; Noche':'&#x2600; D\u00eda';
  var gT=document.getElementById('gT');
  if(gT){var s=gT.querySelectorAll('stop');
    s[0].setAttribute('stop-color',d?'#c9b896':'#1a1f10');s[0].setAttribute('stop-opacity',d?'.5':'.3');
    s[1].setAttribute('stop-color',d?'#b8a880':'#0f1008');s[1].setAttribute('stop-opacity',d?'.6':'.45');}
  var gp=document.getElementById('gp');
  if(gp){var p=gp.querySelector('path');if(p)p.setAttribute('stroke',d?'rgba(0,0,0,.06)':'rgba(255,255,255,.04)');}
  var cc=document.getElementById('compass');
  if(cc){var ci=cc.querySelector('circle');
    ci.setAttribute('fill',d?'rgba(255,255,255,.85)':'rgba(10,14,23,.8)');
    ci.setAttribute('stroke',d?'rgba(0,0,0,.15)':'rgba(255,255,255,.2)');}
}

var I={
  sauna:{t:'&#x1F3E0; Sauna',h:'<div class="d">Edificio madera 3.5m &times; 6m (planta), 4m alto</div><div class="d">Pared este (6m) da al Parque GI</div><div class="d">Pared sur (3.5m) da a zona exterior (fuera per&iacute;metro)</div><div class="d">C&aacute;mara Dahua en pared este</div><div class="d">Refugio nocturno + perchas + ponederos</div>'},
  galI:{t:'&#x1F3E0; Gallinero I (Caseta)',h:'<div class="d">Caseta peque&ntilde;a 1.5m &times; 0.9m, 2m alto</div><div class="d">Pegado al muro norte, puerta al SUR</div>'},
  galII:{t:'&#x1F3E0; Gallinero II (Caseta)',h:'<div class="d">Caseta ~2.5m &times; 2m, puerta al SUR</div><div class="d">14 aves: Sussex, Vorwerk, Sulmtaler, Marans, Araucana, Andaluza, Pita Pinta, F1</div><div class="d">OvoSfera ID: 3 &middot; C&aacute;mara Vigi GII</div>'},
  pGI:{t:'&#x1F33F; Parque Gallinero I',h:'<div class="d">Per&iacute;metro rojo &mdash; forma de L/embudo</div><div class="d">Zona abierta 6m &times; 6m junto a la sauna</div><div class="d">Pasillo 2.5m ancho corriendo a lo largo del muro</div><div class="d">Desde v&eacute;rtice sauna hasta Gallinero II</div><div class="d">13 aves asignadas</div>'},
  pGII:{t:'&#x1F33F; Parque Gallinero II',h:'<div class="d">~3m &times; 8m &mdash; zona cerrada con malla met&aacute;lica</div><div class="d">T&uacute;nel/arco, bebedero + comedero</div><div class="d">12 aves asignadas</div>'},
  valla:{t:'&#x1F534; Valla separadora',h:'<div class="d">Malla met&aacute;lica con postes de madera</div><div class="d">Separa Parque GI de Parque GII (N-S)</div>'},
  huerto:{t:'&#x1F331; Huerto',h:'<div class="d">Bancales elevados de madera</div><div class="d">FUERA del per&iacute;metro rojo y azul</div><div class="d">Sin acceso para gallinas</div>'},

  comp:{t:'&#x267B; Compostero',h:'<div class="d">Zona de compostaje en la zona abierta del Parque GI</div>'},
  cDahua:{t:'&#x1F4F9; Cam Dahua',h:'<div class="d">DH-IPC-HFW2841T-ZS &middot; 4K/8MP</div><div class="d">Stream: sauna_durrif_1 &middot; Auth: digest</div><div class="d">Micr&oacute;fono &#x2705; &middot; Altavoz &#x274C;</div><div class="d">Posici&oacute;n: pared ESTE de la sauna (6m)</div><div class="d">Vista: E/SE hacia el Parque GI</div>'},
