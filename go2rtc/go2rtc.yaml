# go2rtc — Proxy RTSP → WebRTC/HLS/MJPEG para cámaras gallineros
# Granja Los Capones de Palacio — hub.ovosfera.com
#
# Gallinero Durrif I  → TP-Link VIGI    10.10.10.11   (admin / 123456, 4K H.265)
# Gallinero Durrif II → TP-Link VIGI    10.10.10.10   (admin / 123456, 4K H.265)

streams:
  # ── Gallinero Durrif I — TP-Link VIGI (10.10.10.11) ──
  # 3840x2160 4K H.265
  gallinero_durrif_1:
    - rtsp://admin:123456@10.10.10.11:554/stream1
  gallinero_durrif_1_sub:
    - rtsp://admin:123456@10.10.10.11:554/stream2

  # ── Gallinero Durrif II — TP-Link VIGI (10.10.10.10) ──
  # 3840x2160 4K H.265
  gallinero_durrif_2:
    - rtsp://admin:123456@10.10.10.10:554/stream1
  gallinero_durrif_2_sub:
    - rtsp://admin:123456@10.10.10.10:554/stream2

api:
  listen: ":1984"
  origin: "*"

rtsp:
  listen: ":8554"

webrtc:
  candidates:
    - 10.10.10.1:8555         # acceso local LAN cámaras
    - stun:stun.l.google.com:19302

log:
  level: info
